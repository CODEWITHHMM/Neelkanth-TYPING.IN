<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <title>Neelkanth Typing – English Typing Test</title>
    <link rel="icon" type="image/png" href="./img/logo.ico">
    <style>
        body {
            font-family: Mangal, Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        .container {
            max-width: 100%;
            justify-items: center;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        input,
        select,
        button {
            font-family: Mangal;
            font-size: 16px;
            padding: 6px;
            border-radius: 4px;
        }

        button {
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        #timer {
            font-weight: bold;
            color: #e74c3c;
        }

        #paragraph {
            font-size: 3vh;
            width: 98%;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
        }

        .correct {
            color: green;
        }

        .incorrect {
            color: red;
        }

        #typingArea {
            width: 98%;
            height: 200px;
            padding: 10px;
            font-size: 3vh;
            font-family: Mangal;
            margin-top: 40px;
        }

        #result {
            width: 90%;
            display: none;
            margin-top: 15px;
            background: #ecfdf5;
            border: 1px solid #2ecc71;
            padding: 15px;
        }

        .footer {
            text-align: center;
            color: #777;
            margin-top: 10px;
        }


        /* ===== RESULT UI DESIGN ===== */
        #result {
            width: 95%;
            max-width: 500px;
            margin: 20px auto;
            display: none;
            background: linear-gradient(135deg, #e8f8ff, #f9fffc);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.6s ease-in-out;
        }

        #result h2 {
            text-align: center;
            margin: 0 0 15px;
            color: #2c3e50;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .result-box {
            background: #ffffff;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .result-box span {
            display: block;
            font-size: 22px;
            font-weight: bold;
            color: #27ae60;
        }

        .result-box label {
            font-size: 14px;
            color: #555;
        }

        .result-footer {
            margin-top: 15px;
            text-align: center;
        }

        .result-footer button {
            padding: 8px 20px;
            font-size: 16px;
            border-radius: 20px;
            background: #27ae60;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Neelkanth Typing <br> English Typing Test</h1>

        <div class="controls">
            <div>Name: <input id="studentName"></div>

            <div>
                Chapter:
                <select id="chapterSelect"></select>
            </div>

            <div>
                Time:
                <select id="timeSelect">
                    <option value="60">1 Minutes</option>
                    <option value="300">5 Minutes</option>
                    <option value="600">10 Minutes</option>
                    <option value="900">15 Minutes</option>
                </select>
            </div>

            <div>⏱️ <span id="timer">00:00</span></div>
            <button style=" background:#e74c3c;" id="backspaceBtn" onclick="toggleBackspace()">Backspace: OFF</button>

        </div>

        <div style="margin-bottom:10px;">
            <button onclick="startTest()">Start</button>
            <button onclick="pauseTest()">Pause</button>
            <button onclick="submitTest()">Submit</button>
        </div>


        <div id="paragraph"></div>
        <textarea id="typingArea" disabled placeholder="यहाँ टाइप करें..."></textarea>

        <div id="result">
            <h2>📊 Test Result</h2>

            <div style="text-align:center;margin-bottom:10px;">
                <b id="rName"></b>
            </div>

            <div class="result-grid">
                <div class="result-box">
                    <span id="rWpm">0</span>
                    <label>WPM</label>
                </div>

                <div class="result-box">
                    <span id="rErrors">0</span>
                    <label>Errors</label>
                </div>

                <div class="result-box">
                    <span id="rAccuracy">0%</span>
                    <label>Accuracy</label>
                </div>

                <div class="result-box">
                    <span id="finalGrade">-</span>
                    <label>Grade</label>
                </div>
            </div>

            <div class="result-footer">
                <button onclick="window.print()">🖨️ Print Result</button>
            </div>
        </div>


        <div class="footer">© Neelkanth Typing</div>
    </div>

    <script>
        document.addEventListener("copy", e => e.preventDefault());
        document.addEventListener("cut", e => e.preventDefault());
        document.addEventListener("paste", e => e.preventDefault());
        document.addEventListener("contextmenu", e => e.preventDefault());

        // ==================== DEVTOOLS / INSPECT DISABLE ====================
        document.addEventListener("keydown", function (e) {
            if (e.keyCode === 123) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) e.preventDefault();
            if (e.ctrlKey && e.keyCode === 85) e.preventDefault();
        });

        // ==================== FULLSCREEN ====================
        function goFullScreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.mozRequestFullScreen) elem.mozRequestFullScreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        }

        const originalStartTest = startTest;
        startTest = function () {
            goFullScreen();
            originalStartTest();
        }

        // ==================== CHAPTER DATA ====================
        const chapters = {
            1:"a quick brown fox jumps over a lazy dog and then moves back to a small cave near a river bank where soft sand and calm water make a very nice view for any man who wants to relax and enjoy time with peace and slow breath as the wind flows over trees and leaves make a soft sound that feels very calm and warm some brave men and women try to improve their typing skill by using every row of the keyboard such as q w e r t y u i o p along with a s d f j k l and z x c v b n m so that they can write fast and avoid any error while doing work or practice in daily life with focus and care in this way they learn to use each key with proper finger and build muscle memory which helps them type words like exam basic value zone mix random words and even complex lines with ease and speed without looking at the keyboard again and again which is a very good habit for any learner many users start slow but with time they gain speed and accuracy and they feel more confident while typing long text or data entry tasks and they can even take part in typing tests or job exams where speed and accuracy matter a lot and give them a better chance to win so keep practice daily and try to use all rows evenly and avoid stress or rush because smooth and steady typing always gives better result than fast but wrong typing and this will help you grow step by step in a simple and effective way",
            2:"g",
            3:"f",
            4:"d",
            

        };

        // ==================== ELEMENTS ====================
        const chapterSelect = document.getElementById("chapterSelect");
        const paragraph = document.getElementById("paragraph");
        const typingArea = document.getElementById("typingArea");
        const studentName = document.getElementById("studentName");
        const timeSelect = document.getElementById("timeSelect");
        const timer = document.getElementById("timer");
        const result = document.getElementById("result");
        const rName = document.getElementById("rName");
        const rWpm = document.getElementById("rWpm");
        const rErrors = document.getElementById("rErrors");
        const rAccuracy = document.getElementById("rAccuracy");
        const finalGrade = document.getElementById("finalGrade");

        let text = "", paraWords = [], timeLeft = 0, interval = null, paused = false;

        // ==================== CHAPTER DROPDOWN ====================
        for (let key in chapters) {
            let opt = document.createElement("option");
            opt.value = key;
            opt.innerText = `Chapter ${key}`;
            chapterSelect.appendChild(opt);
        }

        // ==================== LOAD CHAPTER (RESET LOGIC ADDED) ====================
        function loadChapter() {
            if (interval !== null) {
                clearInterval(interval);
                interval = null;
            }

            paused = false;
            timeLeft = parseInt(timeSelect.value);
            updateTimer();

            result.style.display = "none";
            rName.innerText = "";
            rWpm.innerText = "0";
            rErrors.innerText = "0";
            rAccuracy.innerText = "0";
            finalGrade.innerText = "";

            text = chapters[chapterSelect.value];
            paraWords = text.split(" ");
            paragraph.innerHTML = paraWords.map(w => `<span>${w} </span>`).join("");

            typingArea.value = "";
            typingArea.disabled = true;
        }

        chapterSelect.addEventListener("change", loadChapter);
        loadChapter();

        // ==================== START TEST ====================
        function startTest() {
            if (studentName.value.trim() === "") {
                alert("कृपया नाम लिखें");
                return;
            }

            if (interval !== null && !paused) return;

            if (interval === null) {
                timeLeft = parseInt(timeSelect.value);
                updateTimer();
            }

            paused = false;
            typingArea.disabled = false;
            typingArea.focus();

            if (interval === null) {
                interval = setInterval(() => {
                    if (!paused) {
                        timeLeft--;
                        updateTimer();
                        if (timeLeft <= 0) endTest();
                    }
                }, 1000);
            }
        }

        function pauseTest() {
            if (interval === null) return;
            paused = !paused;
        }

        function submitTest() {
            if (!interval) { alert("Test start नहीं हुआ"); return; }
            endTest();
        }

        function updateTimer() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timer.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // ==================== TYPING LOGIC ====================
        typingArea.addEventListener("input", () => {
            const typed = typingArea.value.trim().split(/\s+/);
            const spans = document.querySelectorAll("#paragraph span");

            spans.forEach((span, i) => {
                if (!typed[i]) span.className = "";
                else if (typed[i] === paraWords[i]) span.className = "correct";
                else span.className = "incorrect";
            });

            if (typed.length === paraWords.length && typed[typed.length - 1] === paraWords[paraWords.length - 1]) {
                endTest();
            }
        });

        // ==================== END TEST ====================
        function endTest() {
            clearInterval(interval);
            interval = null;
            typingArea.disabled = true;

            const typed = typingArea.value.trim().split(" ");
            let errors = 0;
            typed.forEach((w, i) => { if (w !== paraWords[i]) errors++; });

            let totalTime = parseInt(timeSelect.value) - timeLeft;
            let minutes = totalTime / 60 || 1;
            let wpm = Math.round(typed.length / minutes);
            let acc = typed.length ? Math.round(((typed.length - errors) / typed.length) * 100) : 0;

            rName.innerText = studentName.value;
            rWpm.innerText = wpm;
            rErrors.innerText = errors;
            rAccuracy.innerText = acc;
            finalGrade.innerText = getGrade(acc);
            result.style.display = "block";
        }

        // ==================== GRADE ====================
        function getGrade(acc) {
            if (acc >= 95) return "A+";
            if (acc >= 90) return "A";
            if (acc >= 80) return "B";
            if (acc >= 70) return "C";
            return "Needs Practice";
        }

        // ==================== BACKSPACE CONTROL ====================
        let backspaceDisabled = true;
        const backspaceBtn = document.getElementById("backspaceBtn");

        function toggleBackspace() {
            backspaceDisabled = !backspaceDisabled;
            backspaceBtn.innerText = backspaceDisabled ? "Backspace: OFF" : "Backspace: ON";
        }

        typingArea.addEventListener("keydown", function (e) {
            if (backspaceDisabled && e.key === "Backspace") {
                e.preventDefault();
            }
        });
    </script>

</body>

</html>

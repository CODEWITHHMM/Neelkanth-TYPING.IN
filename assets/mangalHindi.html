<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <title>Neelkanth Typing – Hindi Mangal Typing Exercise</title>
    <link rel="icon" type="image/png" href="./img/logo.ico">
    <style>
        body {
            font-family: Mangal, Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        .container {
            max-width: 100%;
            justify-items: center;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        input,
        select,
        button {
            font-family: Mangal;
            font-size: 16px;
            padding: 6px;
            border-radius: 4px;
        }

        button {
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        #timer {
            font-weight: bold;
            color: #e74c3c;
        }

        #paragraph {
            font-size: 3vh;
            width: 98%;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
        }

        .correct {
            color: green;
        }

        .incorrect {
            color: red;
        }

        #typingArea {
            width: 98%;
            height: 200px;
            padding: 10px;
            font-size: 3vh;
            font-family: Mangal;
            margin-top: 40px;
        }

        #result {
            width: 90%;
            display: none;
            margin-top: 15px;
            background: #ecfdf5;
            border: 1px solid #2ecc71;
            padding: 15px;
        }

        .footer {
            text-align: center;
            color: #777;
            margin-top: 10px;
        }


        /* ===== RESULT UI DESIGN ===== */
        #result {
            width: 95%;
            max-width: 500px;
            margin: 20px auto;
            display: none;
            background: linear-gradient(135deg, #e8f8ff, #f9fffc);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.6s ease-in-out;
        }

        #result h2 {
            text-align: center;
            margin: 0 0 15px;
            color: #2c3e50;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .result-box {
            background: #ffffff;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .result-box span {
            display: block;
            font-size: 22px;
            font-weight: bold;
            color: #27ae60;
        }

        .result-box label {
            font-size: 14px;
            color: #555;
        }

        .result-footer {
            margin-top: 15px;
            text-align: center;
        }

        .result-footer button {
            padding: 8px 20px;
            font-size: 16px;
            border-radius: 20px;
            background: #27ae60;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Neelkanth Typing <br> Hindi Mangal Typing Exercise </h1>

        <div class="controls">
            <div>Name: <input id="studentName"></div>

            <div>
                Chapter:
                <select id="chapterSelect"></select>
            </div>

            <div>
                Time:
                <select id="timeSelect">
                    <option value="60">1 Minutes</option>
                    <option value="300">5 Minutes</option>
                    <option value="600">10 Minutes</option>
                    <option value="900">15 Minutes</option>
                </select>
            </div>

            <div>⏱️ <span id="timer">00:00</span></div>
            <button style=" background:#e74c3c;" id="backspaceBtn" onclick="toggleBackspace()">Backspace: OFF</button>

        </div>

        <div style="margin-bottom:10px;">
            <button onclick="startTest()">Start</button>
            <button onclick="pauseTest()">Pause</button>
            <button onclick="submitTest()">Submit</button>
        </div>


        <div id="paragraph"></div>
        <textarea id="typingArea" disabled placeholder="Type Here..."></textarea>

        <div id="result">
            <h2>📊 Test Result</h2>

            <div style="text-align:center;margin-bottom:10px;">
                <b id="rName"></b>
            </div>

            <div class="result-grid">
                <div class="result-box">
                    <span id="rWpm">0</span>
                    <label>WPM</label>
                </div>

                <div class="result-box">
                    <span id="rErrors">0</span>
                    <label>Errors</label>
                </div>

                <div class="result-box">
                    <span id="rAccuracy">0%</span>
                    <label>Accuracy</label>
                </div>

                <div class="result-box">
                    <span id="finalGrade">-</span>
                    <label>Grade</label>
                </div>
            </div>

            <div class="result-footer">
                <button onclick="window.print()">🖨️ Print Result</button>
            </div>
        </div>


        <div class="footer">© Neelkanth Typing</div>
    </div>

    <script>
        document.addEventListener("copy", e => e.preventDefault());
        document.addEventListener("cut", e => e.preventDefault());
        document.addEventListener("paste", e => e.preventDefault());
        document.addEventListener("contextmenu", e => e.preventDefault());

        // ==================== DEVTOOLS / INSPECT DISABLE ====================
        document.addEventListener("keydown", function (e) {
            if (e.keyCode === 123) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) e.preventDefault();
            if (e.ctrlKey && e.keyCode === 85) e.preventDefault();
        });

        // ==================== FULLSCREEN ====================
        function goFullScreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.mozRequestFullScreen) elem.mozRequestFullScreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        }

        const originalStartTest = startTest;
        startTest = function () {
            goFullScreen();
            originalStartTest();
        }

            20: "कम कन कप कर कल कस कट कथ कद कब कमल कनक कपट करत कलम कसन कटम कतन कदर कबल गम गन गप गर गल गस गट गथ गद गब गमन गणक गपत गरम गलन गसन गटन गदन गबल जम जन जप जर जल जस जट जथ जद जब जमन जनक जपत जरन जलम जसन जटन जदन जबल टम टन टप टर टल टस टट टथ टद टब टमन टनक टपत टरन टलम टसन टटन टदन टबल दम दन दप दर दल दस दट दथ दद दब दमन दनक दपत दरन दलम दसन दटन ददन दबल बम बन बप बर बल बस बट बथ बद बब बमन बनक बपत बरन बलम बसन बटन बदन बबल पम पन पप पर पल पस पट पथ पद पब पमन पनक पपत परन पलम पसन पटन पदन पबल रम रन रप रर रल रस रट रथ रद रब रमन रनक रपत ररन रलम रसन रटन रदन रबल",

            21: "मन वन नम कल कम कर पद रत जल दल घर दर जन बन पन तन वनम नमक कमल कलम घरम दरम जनम बनम पनम तनम करना चलना गमन जलन दमन रमन बनना तनना मनना कमला गला जला दला चला करना भरना धरना गहना रहना कमली गली जली दली चली करनी भरनी धरनी गहनी रहनी कमु कमू जनु जनू मनु मनू तनु तनू गुन गुना सुन सुना लुन लूना होना सोना रोना खोना होना सोना होना खेलना देखना बोलना सोचना चलना करना रखना बनाना चलाना जमाना कमाना पाना लाना मनाना बताना जताना कटाना हटाना जमाना बनाना चलाना कराना मनाना जनाना",
            22: "अ आ इ ई उ ऊ ऋ ए ऐ ओ औ अं अः क ख ग घ ङ च छ ज झ ञ ट ठ ड ढ ण त थ द ध न प फ ब भ म य र ल व श ष स ह क्ष त्र ज्ञ",
            23: "अ से अनार, आ से आम, इ से इमली, ई से ईख, उ से उल्लू, ऊ से ऊन, ऋ से ऋषि, ए से एड़ी, ऐ से ऐनक, ओ से ओखली, औ से औरत, अं से अंगूर, अः से दुःख। क से कमल, ख से खरगोश, ग से गमला, घ से घर, ङ से अंग, च से चम्मच, छ से छाता, ज से जहाज, झ से झंडा, ञ से ज्ञान, ट से टमाटर, ठ से ठग, ड से डमरू, ढ से ढोल, ण से बाण, त से तितली, थ से थाली, द से दवात, ध से धनुष, न से नल, प से पतंग, फ से फल, ब से बकरी, भ से भालू, म से मछली, य से यज्ञ, र से रथ, ल से लड्डू, व से वट, श से शेर, ष से षट्कोण, स से सर्प, ह से हाथी, क्ष से क्षत्रिय, त्र से त्रिशूल, ज्ञ से ज्ञानी।",
            24: "राम घर गया। माँ जल ला। फल खा लो। मन लग कर पढ़। राम स्कूल गया। सीता फल खाती है। माँ खाना बनाती है। बच्चे खेल रहे हैं। राम अपने मित्र संग खेलता है। सीता रोज समय पर पढ़ती है। बच्चे मिलकर खेल का आनंद लेते हैं। माता घर में स्वादिष्ट भोजन बनाती है। रमेश ने मीठा आम खाया। गीता ने ऊँची आवाज़ में गाना गाया। मोहन ने नई किताब खरीदी बच्चों ने रंग-बिरंगी पतंग उड़ाई।",
            25: "कृष्ण खेत में काम कर रहा है। प्रकाश सुबह जल्दी उठता है। त्रिशूल भगवान शिव का प्रतीक है। क्षेत्र में हरे-भरे वृक्ष लगे हैं। श्रद्धा से किया गया कार्य सफल होता है। प्रेरणा हमें आगे बढ़ने की शक्ति देती है। ब्राह्मण वेदों का ज्ञान रखते थे। क्षमता के अनुसार परिश्रम करना चाहिए।",
            26: "विद्यालय में शिक्षक बच्चों को ज्ञान देते हैं। विद्यार्थी ध्यानपूर्वक पढ़ाई करते हैं। प्रकृति हमें स्वच्छ वायु और जल प्रदान करती है। मनुष्य को सदैव सच्चाई के मार्ग पर चलना चाहिए। प्रत्येक व्यक्ति को अपने जीवन में अनुशासन बनाए रखना चाहिए। कठिन परिश्रम और दृढ़ संकल्प से सफलता अवश्य मिलती है। क्षेत्रीय विकास के लिए शिक्षा और स्वास्थ्य का महत्व बहुत अधिक है। ज्ञान प्राप्त करने से मनुष्य का व्यक्तित्व निखरता है।",
            27: "प्रज्ञा और श्रद्धा के साथ किया गया कार्य हमेशा श्रेष्ठ होता है। संगठन में शक्ति होती है, इसलिए हमें मिलकर कार्य करना चाहिए। क्षेत्रीय समस्याओं का समाधान समझदारी और धैर्य से किया जा सकता है। सच्चा मित्र वही होता है जो कठिन समय में साथ निभाता है। मानव जीवन में शिक्षा,संस्कार और चरित्र का विशेष महत्व होता है। प्रत्येक विद्यार्थी को नियमित अध्ययन और अभ्यास करना चाहिए। प्रकृति के संरक्षण के लिए हमें वृक्षारोपण करना आवश्यक है। श्रेय उसी को मिलता है जो अपने कर्तव्यों का पालन निष्ठा से करता है।",
            28: "प्रभु प्रेम क्रोध ग्रास त्रय द्वार स्वर श्याम, प्रकाश प्रश्न क्रिया ग्रंथ त्रिशूल स्वभाव श्रवण द्वंद्व, प्रबंधन प्रज्ञा क्रांति ग्रामीण त्रिकोण स्वतंत्र श्रद्धा द्विपक्ष, प्रत्येक प्रोत्साहन क्रियाशील ग्रंथालय त्रैमासिक स्वतंत्रता श्रेयस्कर द्विपक्षीय, प्रत्युत्तर प्राध्यापक क्रियान्वयन ग्रंथकार त्रिकोणमिति स्वाध्याय श्रद्धांजलि द्विपक्षीयता।",
            29: "घर पानी रोटी कपड़ा लड़का लड़की खाना पीना चलना बैठना सोना जागना, खेत हल बैल मिट्टी गाँव चूल्हा काका दादी झोपड़ी पगड़ी खटिया लाठी चप्पल, चरखा गुड़ चना मटकी पगडंडी गड्ढा झाड़ू ठेला टोकरी झोला बरतन आँगन कुआँ, चरवाहा पनघट लुहार कुम्हार बढ़ई धोबी बुनकर मल्लाह चरखी झुनझुना पिटारा गमछा बटुआ लोटा, परांठा सरसों बाजरा अरहर मसूर ककड़ी करेला लहसुन अदरक चिरौरी बतकही खटर-पटर धमा-चौकड़ी गहमागहमी उथल-पुथल।",
            30: "बस ट्रेन बैंक फिल्म डॉक्टर स्कूल कॉलेज टिकट प्लेट पेन पेपर होटल पुलिस ऑफिस, स्टेशन अस्पताल मैनेजर ड्राइवर कंप्यूटर मोबाइल कैमरा इंटरनेट प्रिंटर कीबोर्ड माउस, यूनिवर्सिटी इंजीनियर प्रोफेसर डायरेक्टर गवर्नमेंट मिनिस्टर टेक्नोलॉजी डिजिटल नेटवर्क सॉफ्टवेयर हार्डवेयर, एडमिनिस्ट्रेशन डेमोक्रेसी ग्लोबलाइजेशन इंटरनेशनल ऑर्गनाइजेशन कम्युनिकेशन ट्रांसपोर्टेशन इंफॉर्मेशन टेक्नोलॉजी डेवलपमेंट प्रोफेशनल।",
            31: "कार्यालय पत्र आदेश सूचना विभाग कर्मचारी अधिकारी प्रबंधक प्रशासन योजना रिपोर्ट डेटा फाइल रिकॉर्ड, प्रबंधन प्रणाली तकनीक संचार प्रक्रिया विश्लेषण नियंत्रण संचालन संसाधन विकास संरचना सुरक्षा गुणवत्ता, सूचना प्रौद्योगिकी प्रशासनिक व्यवस्था वित्तीय प्रबंधन तकनीकी सहायता डिजिटल प्रणाली नेटवर्क संरचना डेटा विश्लेषण प्रक्रिया नियंत्रण, कार्यान्वयन मूल्यांकन निगरानी विनियमन मानकीकरण स्वचालन एकीकरण अनुकूलन नवाचार अनुसंधान विकास सूचना प्रसंस्करण प्रणाली।",

        // ==================== ELEMENTS ====================
        const chapterSelect = document.getElementById("chapterSelect");
        const paragraph = document.getElementById("paragraph");
        const typingArea = document.getElementById("typingArea");
        const studentName = document.getElementById("studentName");
        const timeSelect = document.getElementById("timeSelect");
        const timer = document.getElementById("timer");
        const result = document.getElementById("result");
        const rName = document.getElementById("rName");
        const rWpm = document.getElementById("rWpm");
        const rErrors = document.getElementById("rErrors");
        const rAccuracy = document.getElementById("rAccuracy");
        const finalGrade = document.getElementById("finalGrade");

        let text = "", paraWords = [], timeLeft = 0, interval = null, paused = false;

        // ==================== CHAPTER DROPDOWN ====================
        for (let key in chapters) {
            let opt = document.createElement("option");
            opt.value = key;
            opt.innerText = `Chapter ${key}`;
            chapterSelect.appendChild(opt);
        }

        // ==================== LOAD CHAPTER (RESET LOGIC ADDED) ====================
        function loadChapter() {
            if (interval !== null) {
                clearInterval(interval);
                interval = null;
            }

            paused = false;
            timeLeft = parseInt(timeSelect.value);
            updateTimer();

            result.style.display = "none";
            rName.innerText = "";
            rWpm.innerText = "0";
            rErrors.innerText = "0";
            rAccuracy.innerText = "0";
            finalGrade.innerText = "";

            text = chapters[chapterSelect.value];
            paraWords = text.split(" ");
            paragraph.innerHTML = paraWords.map(w => `<span>${w} </span>`).join("");

            typingArea.value = "";
            typingArea.disabled = true;
        }

        chapterSelect.addEventListener("change", loadChapter);
        loadChapter();

        // ==================== START TEST ====================
        function startTest() {
            if (studentName.value.trim() === "") {
                alert("Please write a name");
                return;
            }

            if (interval !== null && !paused) return;

            if (interval === null) {
                timeLeft = parseInt(timeSelect.value);
                updateTimer();
            }

            paused = false;
            typingArea.disabled = false;
            typingArea.focus();

            if (interval === null) {
                interval = setInterval(() => {
                    if (!paused) {
                        timeLeft--;
                        updateTimer();
                        if (timeLeft <= 0) endTest();
                    }
                }, 1000);
            }
        }

        function pauseTest() {
            if (interval === null) return;
            paused = !paused;
        }

        function submitTest() {
            if (!interval) { alert("Test start नहीं हुआ"); return; }
            endTest();
        }

        function updateTimer() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timer.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // ==================== TYPING LOGIC ====================
        typingArea.addEventListener("input", () => {
            const typed = typingArea.value.trim().split(/\s+/);
            const spans = document.querySelectorAll("#paragraph span");

            spans.forEach((span, i) => {
                if (!typed[i]) span.className = "";
                else if (typed[i] === paraWords[i]) span.className = "correct";
                else span.className = "incorrect";
            });

            if (typed.length === paraWords.length && typed[typed.length - 1] === paraWords[paraWords.length - 1]) {
                endTest();
            }
        });

        // ==================== END TEST ====================
        function endTest() {
            clearInterval(interval);
            interval = null;
            typingArea.disabled = true;

            const typed = typingArea.value.trim().split(" ");
            let errors = 0;
            typed.forEach((w, i) => { if (w !== paraWords[i]) errors++; });

            let totalTime = parseInt(timeSelect.value) - timeLeft;
            let minutes = totalTime / 60 || 1;
            let wpm = Math.round(typed.length / minutes);
            let acc = typed.length ? Math.round(((typed.length - errors) / typed.length) * 100) : 0;

            rName.innerText = studentName.value;
            rWpm.innerText = wpm;
            rErrors.innerText = errors;
            rAccuracy.innerText = acc;
            finalGrade.innerText = getGrade(acc);
            result.style.display = "block";
        }

        // ==================== GRADE ====================
        function getGrade(acc) {
            if (acc >= 95) return "A+";
            if (acc >= 90) return "A";
            if (acc >= 80) return "B";
            if (acc >= 70) return "C";
            return "Needs Practice";
        }

        // ==================== BACKSPACE CONTROL ====================
        let backspaceDisabled = true;
        const backspaceBtn = document.getElementById("backspaceBtn");

        function toggleBackspace() {
            backspaceDisabled = !backspaceDisabled;
            backspaceBtn.innerText = backspaceDisabled ? "Backspace: OFF" : "Backspace: ON";
        }

        typingArea.addEventListener("keydown", function (e) {
            if (backspaceDisabled && e.key === "Backspace") {
                e.preventDefault();
            }
        });
    </script>

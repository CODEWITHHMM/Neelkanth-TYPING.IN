<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Typing Game Pro+</title>
    <link rel="icon" type="image/png" href="./img/logo.ico">


    <!-- ✅ Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #0f172a;
            color: white;
        }

        .word {
            font-size: 40px;
            letter-spacing: 3px;
        }

        .correct {
            color: #22c55e;
        }

        .wrong {
            color: #ef4444;
        }

        .result {
            display: none;
        }
    </style>
</head>

<body>

    <div class="container py-5">
        <div class="card bg-dark text-white shadow-lg p-4 mx-auto" style="max-width: 600px;">

            <h2 class="text-center mb-4">⌨️ Typing Game Pro+</h2>

            <!-- Setup -->
            <div class="row g-2">
                <div class="col-md-6">
                    <input type="text" id="name" class="form-control" placeholder="Enter Name">
                </div>

                <div class="col-md-6">
                    <select id="Row" class="form-select">
                        <option value="">Select Row</option>
                        <option value="Home">Home</option>
                        <option value="Upper">Upper</option>
                        <option value="Lower">Lower</option>
                        <option value="Number">Number</option>
                    </select>
                </div>

                <div class="col-md-12">
                    <select id="setTime" class="form-select">
                        <option value="">Select Time</option>
                        <option value="1">1 Minute</option>
                        <option value="2">2 Minute</option>
                        <option value="5">5 Minute</option>
                    </select>
                </div>
            </div>

            <!-- Buttons -->
            <div class="text-center mt-3">
                <button class="btn btn-success me-2" onclick="startGame()">Start</button>
                <button class="btn btn-warning me-2" id="backspaceToggle">Backspace: ON</button>
                <button class="btn btn-danger" onclick="submitGame()">Submit</button>
            </div>

            <!-- Word -->
            <div class="text-center my-4">
                <div id="word" class="word">Ready?</div>
                <input type="text" id="input" class="form-control mt-3 text-center" placeholder="Start typing..."
                    disabled>
            </div>

            <!-- Info -->
            <div class="d-flex justify-content-between">
                <div>⏱ Time: <span id="time">0</span></div>
                <div>🎯 Score: <span id="score">0</span></div>
            </div>

            <!-- Result -->
            <div class="result mt-4 p-3 bg-secondary rounded" id="result">
                <h4 class="text-center">🏆 Result</h4>

                <p>Name: <span id="rName"></span></p>
                <p>Row: <span id="rRow"></span></p>
                <p>Score: <span id="rScore"></span></p>
                <p>WPM: <span id="rWpm"></span></p>
                <p>Accuracy: <span id="rAcc"></span>%</p>
                <p>Errors: <span id="rErrors"></span></p>
                <p>Wrong Words: <span id="rWrongWords"></span></p>
            </div>

        </div>
    </div>

    <script>
        const wordSets = {
            Home: ["sad", "dad", "fad", "lad", "add", "all", "ask", "lass", "fall", "flask", "dash", "shall", "glass", "salad", "alfalfa", "falls", "asks",  "flash", "salsa",
                "ads", "alas", "as", "la", "fa", "sal", "dal", "addas", "dada", "lass",
                "fad", "lad", "sadl", "dads", "adds", "lass", "falls", "asks", "flasks", "salads",
                "flash", "dallas", "shall", "alla", "all", "lass", "fall", "sal", "ask", "ads",
                "add", "sad", "dad", "fad", "lad", "all", "ask", "lass", "fall", "flask",
                "dash", "shall", "glass", "salad", "alfalfa", "falls", "asks",  "flash", "salsa",
                "ads", "alas", "as", "la", "fa", "sal", "dal", "addas", "dada", "lass",
                "sadl", "dads", "adds", "lass", "falls", "asks", "flasks", "salads", "flash", "dallas",
                "shall", "alla", "all", "lass", "fall", "sal", "ask", "ads", "add", "sad",
                "dad", "fad", "lad", "all", "ask", "lass", "fall", "flask", "dash", "shall",
                "glass", "salad", "alfalfa", "falls", "asks",  "flash", "salsa", "ads", "alas",
                "as", "la", "fa", "sal", "dal", "addas", "dada", "lass", "sadl", "dads",
                "adds", "lass", "falls", "asks", "flasks", "salads", "flash", "dallas", "shall", "alla",
                "all", "lass", "fall", "sal", "ask", "ads", "add", "sad", "dad", "fad",
                "lad", "all", "ask", "lass", "fall", "flask", "dash", "shall", "glass", "salad",
                "alfalfa", "falls", "asks",  "flash", "salsa", "ads", "alas", "as", "la",
                "fa", "sal", "dal", "addas", "dada", "lass", "sadl", "dads", "adds", "lass",
                "falls", "asks", "flasks", "salads", "flash", "dallas", "shall", "alla", "all", "lass",
                "fall", "sal", "ask", "ads", "add", "sad", "dad", "fad", "lad", "all",
                "ask", "lass", "fall", "flask", "dash", "shall", "glass", "salad", "alfalfa", "falls"],
            Upper: ["type", "write", "power", "water", "tower", "quiet", "outer", "route", "wider", "wired",
                "tried", "tired", "write", "quite", "quote", "equip",  "output", "upper", "lower",
                "party", "earth", "heart", "their", "other", "there", "three", "where", "white", "write",
                "world", "would", "short",
                "sport", "report", "support", "eport", "port", "sort", "word", "row", "tow",
                "two", "tie", "toe", "top", "pot", "pit", "put", "pet", "part", "trap",
                "wrap", "warp", "pair", "pear", "rear", "wear", "tear", "year", "your", "tour",
                "pour", "four", "hour", "our", "rope", "ropey", "wipe", "wire", "tire", "tier",
                "pier", "peer", "rope", "ripe", "rioter", "writer", "twire", "powder", "toward", "reward",
                "upward"],
            Lower: ["zany", "zest", "zonal", "zone", "zoom", "zebra", "zero", "zestful", "zinger", "zonal",
                "axis", "exam", "exact", "excel", "extra", "exist", "exit", "exile", "exalt", "exams",
                "cabin", "cable", "cache", "camel", "cameo", "canal", "candy", "canny", "canoe", "caste",
                "value", "valve", "valid", "vapor", "vivid", "vital", "voice", "vocal", "vowel", "venue",
                "basic", "basis", "basin", "basil", "batch", "bacon", "badge", "baker", "baler", "basil",
                "naval", "navel", "nasty", "natal", "native", "navy", "needy", "nerve", "never", "noble",
                "magic", "mango", "maple", "maker", "mason", "maxim", "medal", "media", "mercy", "metal",
                "sand", "land", "hand", "band", "bend", "send", "tend", "lend", "mend", "candy",
                "vanish", "banish", "finish", "punish", "van", "man", "can", "fan", "pan", "ran"],
            Number: ["a1", "s2", "d3", "f4", "j5", "k6", "l7", "a8", "s9", "d0",
                "as1", "df2", "jk3", "la4", "sa5", "da6", "fa7", "ja8", "ka9", "la0",
                "ad1", "sf2", "dj3", "fk4", "jl5", "ak6", "sl7", "df8", "jk9", "la0",
                "sa1d", "fa2s", "da3f", "ja4k", "ka5l", "la6a", "as7d", "df8s", "jk9a", "la0s",
                "1as", "2df", "3jk", "4la", "5sa", "6da", "7fa", "8ja", "9ka", "0la",
                "a1s", "d2f", "j3k", "l4a", "s5a", "d6a", "f7a", "j8a", "k9a", "l0a",
                "as12", "df23", "jk34", "la45", "sa56", "da67", "fa78", "ja89", "ka90", "la01",
                "1asd", "2dfg", "3jkl", "4las", "5sad", "6dfa", "7fja", "8jka", "9kal", "0las",
                "a12s", "d23f", "j34k", "l45a", "s56a", "d67a", "f78a", "j89a", "k90a", "l01a"]
        };

        let words = [];
        let currentWord = "";
        let score = 0;
        let timeLeft = 0;
        let totalTime = 0;
        let timer;

        let totalWords = 0;
        let correctWords = 0;
        let errors = 0;
        let wrongWords = [];
        let backspaceAllowed = true;

        const wordEl = document.getElementById("word");
        const inputEl = document.getElementById("input");
        const scoreEl = document.getElementById("score");
        const timeEl = document.getElementById("time");
        const backBtn = document.getElementById("backspaceToggle");

        function randomWord() {
            return words[Math.floor(Math.random() * words.length)];
        }

        function startGame() {
            const name = document.getElementById("name").value;
            const Row = document.getElementById("Row").value;
            const minutes = document.getElementById("setTime").value;

            if (!name || !Row || !minutes) {
                alert("Sab select karo!");
                return;
            }

            words = wordSets[Row];

            totalTime = minutes * 60;
            timeLeft = totalTime;

            score = 0;
            totalWords = 0;
            correctWords = 0;
            errors = 0;
            wrongWords = [];

            inputEl.disabled = false;
            inputEl.focus();
            inputEl.value = "";

            scoreEl.innerText = score;
            timeEl.innerText = timeLeft;

            document.getElementById("result").style.display = "none";

            nextWord();

            clearInterval(timer);
            timer = setInterval(() => {
                timeLeft--;
                timeEl.innerText = timeLeft;

                if (timeLeft <= 0) submitGame();
            }, 1000);
        }

        function nextWord() {
            currentWord = randomWord();
            wordEl.innerText = currentWord;
        }

        // ✅ Backspace Toggle
        backBtn.addEventListener("click", () => {
            backspaceAllowed = !backspaceAllowed;
            backBtn.innerText = "Backspace: " + (backspaceAllowed ? "ON" : "OFF");

            backBtn.classList.toggle("btn-success", backspaceAllowed);
            backBtn.classList.toggle("btn-danger", !backspaceAllowed);
        });

        // ✅ Typing Logic
        inputEl.addEventListener("keydown", (e) => {

            // ❌ Backspace block
            if (e.key === "Backspace" && !backspaceAllowed) {
                e.preventDefault();
                return;
            }

            // ✅ Space press = submit word
            if (e.key === " ") {
                e.preventDefault();

                let typedWord = inputEl.value.trim();
                totalWords++;

                if (typedWord === currentWord) {
                    correctWords++;
                    score++;
                    wordEl.className = "word correct";
                } else {
                    errors++;
                    wrongWords.push(typedWord + " ❌ (" + currentWord + ")");
                    wordEl.className = "word wrong";
                }

                setTimeout(() => {
                    wordEl.className = "word text-white";
                }, 300);

                scoreEl.innerText = score;
                inputEl.value = "";
                nextWord();
            }
        });

        // live typing highlight
        inputEl.addEventListener("input", () => {
            if (currentWord.startsWith(inputEl.value)) {
                wordEl.className = "word text-white";
            } else {
                wordEl.className = "word wrong";
            }
        });

        // ✅ Submit
        function submitGame() {
            clearInterval(timer);
            inputEl.disabled = true;

            const name = document.getElementById("name").value;
            const Row = document.getElementById("Row").value;

            let accuracy = totalWords === 0 ? 0 :
                Math.round((correctWords / totalWords) * 100);

            let minutesUsed = (totalTime - timeLeft) / 60;
            let wpm = minutesUsed === 0 ? 0 :
                Math.round(score / minutesUsed);

            document.getElementById("rName").innerText = name;
            document.getElementById("rRow").innerText = Row;
            document.getElementById("rScore").innerText = score;
            document.getElementById("rWpm").innerText = wpm;
            document.getElementById("rAcc").innerText = accuracy;
            document.getElementById("rErrors").innerText = errors;
            document.getElementById("rWrongWords").innerText =
                wrongWords.length ? wrongWords.join(", ") : "None";

            document.getElementById("result").style.display = "block";
            wordEl.innerText = "Finished!";
        }
    </script>

</body>

</html>

<!doctype html>
<html lang="en" class="h-full">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neelkanth Typing Game</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <script src="/_sdk/element_sdk.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&amp;family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap"
        rel="stylesheet">
    <style>
        html,
        body {
            height: 100%;
            margin: 0;
            overflow: auto;
        }

        * {
            font-family: 'Outfit', 'Mangal', Arial, sans-serif;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
            }

            50% {
                box-shadow: 0 0 40px rgba(99, 102, 241, 0.6);
            }
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        @keyframes pop {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.15);
            }

            100% {
                transform: scale(1);
            }
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes countPulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
                color: #f59e0b;
            }

            100% {
                transform: scale(1);
            }
        }

        .fade-up {
            animation: fadeUp 0.5s ease forwards;
        }

        .shake {
            animation: shake 0.3s ease;
        }

        .pop {
            animation: pop 0.3s ease;
        }

        .slide-down {
            animation: slideDown 0.4s ease forwards;
        }

        .count-pulse {
            animation: countPulse 0.5s ease;
        }

        .glow-ring {
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .word-display {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.1), rgba(168, 85, 247, 0.1));
            border: 2px solid rgba(99, 102, 241, 0.3);
            transition: all 0.3s ease;
        }

        .word-display.correct {
            border-color: #22c55e;
            background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(34, 197, 94, 0.05));
        }

        .word-display.wrong {
            border-color: #ef4444;
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.15), rgba(239, 68, 68, 0.05));
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
            border: 1px solid rgba(99, 102, 241, 0.2);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .input-field {
            background: rgba(30, 41, 59, 0.6);
            border: 2px solid rgba(99, 102, 241, 0.3);
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        .input-field:focus {
            border-color: #6366f1;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
            outline: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: rgba(51, 65, 85, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.3);
            transition: all 0.2s ease;
        }

        .btn-secondary:hover {
            background: rgba(71, 85, 105, 0.6);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .timer-ring {
            position: relative;
            width: 80px;
            height: 80px;
        }

        .timer-ring svg {
            transform: rotate(-90deg);
        }

        .timer-ring circle {
            fill: none;
            stroke-width: 4;
        }

        .timer-ring .bg {
            stroke: rgba(99, 102, 241, 0.15);
        }

        .timer-ring .fg {
            stroke: #6366f1;
            stroke-linecap: round;
            transition: stroke-dashoffset 0.5s ease, stroke 0.3s ease;
        }

        .level-btn {
            transition: all 0.2s ease;
        }

        .level-btn.active {
            background: rgba(99, 102, 241, 0.3);
            border-color: #6366f1;
        }

        .progress-bar {
            height: 4px;
            background: rgba(99, 102, 241, 0.15);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #6366f1, #8b5cf6);
            transition: width 0.3s ease;
            border-radius: 2px;
        }

        .result-card {
            background: linear-gradient(135deg, rgba(30, 41, 59, 0.95), rgba(15, 23, 42, 0.98));
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .hindi-word {
            font-family: 'Mangal', 'Noto Sans Devanagari', sans-serif;
        }

        .lang-toggle {
            position: relative;
            width: 44px;
            height: 24px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .lang-toggle .knob {
            position: absolute;
            top: 2px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: white;
            transition: left 0.3s ease;
        }
    </style>
    <style>
        body {
            box-sizing: border-box;
        }
    </style>
    <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
</head>

<body class="h-full" style="background: #0f172a;">
    <div id="app" class="h-full w-full overflow-auto"
        style="background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);"><!-- Header -->
        <header class="text-center pt-6 pb-4 px-4 fade-up">
            <div class="flex items-center justify-center gap-2 mb-1">
                <div class="w-8 h-8 rounded-lg flex items-center justify-center"
                    style="background: linear-gradient(135deg, #6366f1, #8b5cf6);"><i data-lucide="keyboard"
                        style="width:18px;height:18px;color:white;"></i>
                </div>
                <h1 id="brandTitle" class="text-xl md:text-2xl font-bold text-white tracking-tight">Neelkanth Typing
                    &amp; Steno Classes</h1>
            </div>
            <p id="subtitleText" class="text-indigo-300/70 text-sm">Improve Your Typing Speed &amp; Accuracy</p>
        </header><!-- Main Content -->
        <main class="max-w-2xl mx-auto px-4 pb-8"><!-- Controls Bar -->
            <div id="controlsBar" class="flex flex-wrap items-center justify-between gap-3 mb-5 fade-up"
                style="animation-delay:0.1s;"><!-- Level Selector -->
                <div class="flex gap-2"><button
                        class="level-btn active text-xs font-medium px-3 py-1.5 rounded-lg text-indigo-300 border border-indigo-500/30"
                        data-level="easy" onclick="setLevel('easy')">Easy</button> <button
                        class="level-btn text-xs font-medium px-3 py-1.5 rounded-lg text-indigo-300 border border-indigo-500/20"
                        data-level="medium" onclick="setLevel('medium')">Medium</button> <button
                        class="level-btn text-xs font-medium px-3 py-1.5 rounded-lg text-indigo-300 border border-indigo-500/20"
                        data-level="hard" onclick="setLevel('hard')">Hard</button>
                </div><!-- Language Toggle -->
                <div class="flex items-center gap-2"><span class="text-xs text-indigo-300/60">EN</span>
                    <div id="langToggle" class="lang-toggle" style="background: rgba(99,102,241,0.2);"
                        onclick="toggleLang()">
                        <div class="knob" style="left: 2px;"></div>
                    </div><span class="text-xs text-indigo-300/60">हिं</span>
                </div>
            </div><!-- Timer + Stats -->
            <div id="statsRow" class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-5 fade-up"
                style="animation-delay:0.15s;">
                <div class="stat-card rounded-xl p-3 text-center">
                    <div class="timer-ring mx-auto mb-1">
                        <svg width="80" height="80" viewbox="0 0 80 80">
                            <circle class="bg" cx="40" cy="40" r="36"></circle>
                            <circle id="timerCircle" class="fg" cx="40" cy="40" r="36" stroke-dasharray="226.2"
                                stroke-dashoffset="0"></circle>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center"><span id="timerText"
                                class="mono text-lg font-bold text-white">60</span>
                        </div>
                    </div>
                    <div class="text-[10px] text-indigo-300/50 uppercase tracking-wider">
                        Time
                    </div>
                </div>
                <div class="stat-card rounded-xl p-3 text-center flex flex-col justify-center">
                    <div id="wpmDisplay" class="mono text-2xl font-bold text-white">
                        0
                    </div>
                    <div class="text-[10px] text-indigo-300/50 uppercase tracking-wider">
                        WPM
                    </div>
                </div>
                <div class="stat-card rounded-xl p-3 text-center flex flex-col justify-center">
                    <div id="accuracyDisplay" class="mono text-2xl font-bold text-emerald-400">
                        100%
                    </div>
                    <div class="text-[10px] text-indigo-300/50 uppercase tracking-wider">
                        Accuracy
                    </div>
                </div>
                <div class="stat-card rounded-xl p-3 text-center flex flex-col justify-center">
                    <div class="flex justify-center gap-3">
                        <div><span id="correctDisplay" class="mono text-lg font-bold text-emerald-400">0</span>
                            <div class="text-[10px] text-emerald-400/50">
                                ✓
                            </div>
                        </div>
                        <div class="w-px bg-indigo-500/20"></div>
                        <div><span id="wrongDisplay" class="mono text-lg font-bold text-red-400">0</span>
                            <div class="text-[10px] text-red-400/50">
                                ✗
                            </div>
                        </div>
                    </div>
                    <div class="text-[10px] text-indigo-300/50 uppercase tracking-wider mt-1">
                        Words
                    </div>
                </div>
            </div><!-- Word Progress -->
            <div class="progress-bar mb-4 fade-up" style="animation-delay:0.2s;">
                <div id="progressFill" class="progress-fill" style="width:0%"></div>
            </div><!-- Word Display -->
            <div id="wordBox" class="word-display rounded-2xl p-6 md:p-8 text-center mb-4 fade-up"
                style="animation-delay:0.25s;">
                <div id="wordCounter" class="text-[10px] text-indigo-300/40 uppercase tracking-widest mb-2 mono">
                    Word 0 / 0
                </div>
                <div id="currentWord" class="text-3xl md:text-5xl font-bold text-white tracking-wide select-none"
                    style="min-height:3.5rem;">
                    —
                </div>
            </div><!-- Input -->
            <div class="fade-up" style="animation-delay:0.3s;"><input id="typingInput" type="text"
                    class="input-field w-full rounded-xl px-5 py-3.5 text-white text-lg mono text-center"
                    placeholder="Type here..." disabled autocomplete="off" autocorrect="off" autocapitalize="off"
                    spellcheck="false">
            </div><!-- Buttons -->
            <div class="flex justify-center gap-3 mt-5 fade-up" style="animation-delay:0.35s;"><button id="startBtn"
                    class="btn-primary px-6 py-2.5 rounded-xl text-white font-semibold text-sm flex items-center gap-2"
                    onclick="startGame()"> <i data-lucide="play" style="width:16px;height:16px;"></i> Start </button>
                <button id="restartBtn"
                    class="btn-secondary px-6 py-2.5 rounded-xl text-indigo-300 font-medium text-sm flex items-center gap-2"
                    onclick="restartGame()" style="display:none;"> <i data-lucide="rotate-ccw"
                        style="width:16px;height:16px;"></i> Restart </button>
            </div><!-- Results Overlay -->
            <div id="resultOverlay" class="fixed inset-0 flex items-center justify-center p-4 z-50"
                style="display:none; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);">
                <div class="result-card rounded-2xl p-6 md:p-8 max-w-md w-full slide-down">
                    <div class="text-center mb-6">
                        <div id="resultEmoji" class="text-5xl mb-2">
                            🏆
                        </div>
                        <h2 id="resultTitle" class="text-2xl font-bold text-white mb-1">Great Job!</h2>
                        <p id="resultMsg" class="text-indigo-300/70 text-sm"></p>
                    </div>
                    <div class="grid grid-cols-2 gap-3 mb-6">
                        <div class="stat-card rounded-xl p-4 text-center">
                            <div id="resWpm" class="mono text-3xl font-bold text-white">
                                0
                            </div>
                            <div class="text-xs text-indigo-300/50 mt-1">
                                WPM
                            </div>
                        </div>
                        <div class="stat-card rounded-xl p-4 text-center">
                            <div id="resAccuracy" class="mono text-3xl font-bold text-emerald-400">
                                0%
                            </div>
                            <div class="text-xs text-indigo-300/50 mt-1">
                                Accuracy
                            </div>
                        </div>
                        <div class="stat-card rounded-xl p-4 text-center">
                            <div id="resCorrect" class="mono text-3xl font-bold text-emerald-400">
                                0
                            </div>
                            <div class="text-xs text-indigo-300/50 mt-1">
                                Correct
                            </div>
                        </div>
                        <div class="stat-card rounded-xl p-4 text-center">
                            <div id="resWrong" class="mono text-3xl font-bold text-red-400">
                                0
                            </div>
                            <div class="text-xs text-indigo-300/50 mt-1">
                                Wrong
                            </div>
                        </div>
                    </div>
                    <div class="flex justify-center"><button
                            class="btn-primary px-8 py-2.5 rounded-xl text-white font-semibold text-sm flex items-center gap-2"
                            onclick="restartGame()"> <i data-lucide="rotate-ccw" style="width:16px;height:16px;"></i>
                            Play Again </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

                    document.getElementById('currentWord').classList.remove('pop');
                }, 300);
                if (wordIndex >= gameWords.length) { endGame(); return; }
                updateDisplay();
            } else if (val.length >= target.length && val !== target) {
                wrong++;
                playWrongSound();
                box.className = 'word-display wrong rounded-2xl p-6 md:p-8 text-center mb-4';
                this.classList.add('shake');
                wordIndex++;
                this.value = '';
                setTimeout(() => {
                    box.className = 'word-display rounded-2xl p-6 md:p-8 text-center mb-4';
                    this.classList.remove('shake');
                }, 300);
                if (wordIndex >= gameWords.length) { endGame(); return; }
                updateDisplay();
            }
        });

        // Also handle space for wrong word early submission
        document.getElementById('typingInput').addEventListener('keydown', function (e) {
            if (e.key === ' ' && gameActive && wordIndex < gameWords.length) {
                e.preventDefault();
                const val = this.value.trim();
                if (!val) return;
                const target = gameWords[wordIndex];
                const box = document.getElementById('wordBox');
                if (val === target) {
                    correct++;
                    playCorrectSound();
                    box.className = 'word-display correct rounded-2xl p-6 md:p-8 text-center mb-4';
                } else {
                    wrong++;
                    playWrongSound();
                    box.className = 'word-display wrong rounded-2xl p-6 md:p-8 text-center mb-4';
                    this.classList.add('shake');
                }
                wordIndex++;
                this.value = '';
                setTimeout(() => {
                    box.className = 'word-display rounded-2xl p-6 md:p-8 text-center mb-4';
                    this.classList.remove('shake');
                }, 300);
                if (wordIndex >= gameWords.length) { endGame(); return; }
                updateDisplay();
            }
        });

        // ── Element SDK ──
        const defaultConfig = {
            brand_title: 'Neelkanth Typing & Steno Classes',
            subtitle_text: 'Improve Your Typing Speed & Accuracy',
            background_color: '#0f172a',
            surface_color: '#1e293b',
            text_color: '#e2e8f0',
            primary_action_color: '#6366f1',
            secondary_action_color: '#8b5cf6',
            font_family: 'Outfit',
            font_size: 16
        };

        function applyConfig(config) {
            const c = { ...defaultConfig, ...config };
            document.getElementById('brandTitle').textContent = c.brand_title;
            document.getElementById('subtitleText').textContent = c.subtitle_text;

            // Colors
            document.getElementById('app').style.background = `linear-gradient(180deg, ${c.background_color} 0%, ${c.surface_color} 50%, ${c.background_color} 100%)`;
            document.querySelectorAll('.stat-card, .result-card').forEach(el => { el.style.borderColor = c.primary_action_color + '33'; });

            // Font
            const font = c.font_family || defaultConfig.font_family;
            const baseStack = 'Arial, sans-serif';
            document.getElementById('brandTitle').style.fontFamily = `${font}, ${baseStack}`;
            document.getElementById('subtitleText').style.fontFamily = `${font}, ${baseStack}`;

            // Font size
            const sz = c.font_size || defaultConfig.font_size;
            document.getElementById('brandTitle').style.fontSize = `${sz * 1.5}px`;
            document.getElementById('subtitleText').style.fontSize = `${sz * 0.875}px`;
        }

        window.elementSdk.init({
            defaultConfig,
            onConfigChange: async (config) => applyConfig(config),
            mapToCapabilities: (config) => ({
                recolorables: [
                    { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
                    { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
                    { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
                    { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
                    { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
                ],
                borderables: [],
                fontEditable: { get: () => config.font_family || defaultConfig.font_family, set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
                fontSizeable: { get: () => config.font_size || defaultConfig.font_size, set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
            }),
            mapToEditPanelValues: (config) => new Map([
                ['brand_title', config.brand_title || defaultConfig.brand_title],
                ['subtitle_text', config.subtitle_text || defaultConfig.subtitle_text]
            ])
        });

        prepareWords();
        lucide.createIcons();
    </script>

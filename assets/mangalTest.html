<!DOCTYPE html>
<html lang="hi">

<head>
    <meta charset="UTF-8">
    <title>Neelkanth Typing – Hindi Mangal Typing Exercise</title>
    <link rel="icon" type="image/png" href="./img/logo.ico">
    <style>
        body {
            font-family: Mangal, Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
        }

        .container {
            max-width: 100%;
            justify-items: center;
            margin: auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
        }

        .controls {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 10px;
        }

        input,
        select,
        button {
            font-family: Mangal;
            font-size: 16px;
            padding: 6px;
            border-radius: 4px;
        }

        button {
            background: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #2980b9;
        }

        #timer {
            font-weight: bold;
            color: #e74c3c;
        }

        #paragraph {
            font-size: 3vh;
            width: 98%;
            height: 200px;
            overflow-y: auto;
            border: 1px solid #333;
            padding: 10px;
        }

        .correct {
            color: green;
        }

        .incorrect {
            color: red;
        }

        #typingArea {
            width: 98%;
            height: 200px;
            padding: 10px;
            font-size: 3vh;
            font-family: Mangal;
            margin-top: 40px;
        }

        #result {
            width: 90%;
            display: none;
            margin-top: 15px;
            background: #ecfdf5;
            border: 1px solid #2ecc71;
            padding: 15px;
        }

        .footer {
            text-align: center;
            color: #777;
            margin-top: 10px;
        }


        /* ===== RESULT UI DESIGN ===== */
        #result {
            width: 95%;
            max-width: 500px;
            margin: 20px auto;
            display: none;
            background: linear-gradient(135deg, #e8f8ff, #f9fffc);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
            animation: fadeIn 0.6s ease-in-out;
        }

        #result h2 {
            text-align: center;
            margin: 0 0 15px;
            color: #2c3e50;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .result-box {
            background: #ffffff;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .result-box span {
            display: block;
            font-size: 22px;
            font-weight: bold;
            color: #27ae60;
        }

        .result-box label {
            font-size: 14px;
            color: #555;
        }

        .result-footer {
            margin-top: 15px;
            text-align: center;
        }

        .result-footer button {
            padding: 8px 20px;
            font-size: 16px;
            border-radius: 20px;
            background: #27ae60;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Neelkanth Typing <br> Hindi Mangal Typing Exercise </h1>

        <div class="controls">
            <div>Name: <input id="studentName"></div>

            <div>
                Chapter:
                <select id="chapterSelect"></select>
            </div>

            <div>
                Time:
                <select id="timeSelect">
                    <option value="60">1 Minutes</option>
                    <option value="300">5 Minutes</option>
                    <option value="600">10 Minutes</option>
                    <option value="900">15 Minutes</option>
                </select>
            </div>

            <div>⏱️ <span id="timer">00:00</span></div>
            <button style=" background:#e74c3c;" id="backspaceBtn" onclick="toggleBackspace()">Backspace: OFF</button>

        </div>

        <div style="margin-bottom:10px;">
            <button onclick="startTest()">Start</button>
            <button onclick="pauseTest()">Pause</button>
            <button onclick="submitTest()">Submit</button>
        </div>


        <div id="paragraph"></div>
        <textarea id="typingArea" disabled placeholder="Type Here..."></textarea>

        <div id="result">
            <h2>📊 Test Result</h2>

            <div style="text-align:center;margin-bottom:10px;">
                <b id="rName"></b>
            </div>

            <div class="result-grid">
                <div class="result-box">
                    <span id="rWpm">0</span>
                    <label>WPM</label>
                </div>

                <div class="result-box">
                    <span id="rErrors">0</span>
                    <label>Errors</label>
                </div>

                <div class="result-box">
                    <span id="rAccuracy">0%</span>
                    <label>Accuracy</label>
                </div>

                <div class="result-box">
                    <span id="finalGrade">-</span>
                    <label>Grade</label>
                </div>
            </div>

            <div class="result-footer">
                <button onclick="window.print()">🖨️ Print Result</button>
            </div>
        </div>


        <div class="footer">© Neelkanth Typing</div>
    </div>

    <script>
        document.addEventListener("copy", e => e.preventDefault());
        document.addEventListener("cut", e => e.preventDefault());
        document.addEventListener("paste", e => e.preventDefault());
        document.addEventListener("contextmenu", e => e.preventDefault());

        // ==================== DEVTOOLS / INSPECT DISABLE ====================
        document.addEventListener("keydown", function (e) {
            if (e.keyCode === 123) e.preventDefault();
            if (e.ctrlKey && e.shiftKey && (e.keyCode === 73 || e.keyCode === 74 || e.keyCode === 67)) e.preventDefault();
            if (e.ctrlKey && e.keyCode === 85) e.preventDefault();
        });

        // ==================== FULLSCREEN ====================
        function goFullScreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.mozRequestFullScreen) elem.mozRequestFullScreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
            else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
        }

        const originalStartTest = startTest;
        startTest = function () {
            goFullScreen();
            originalStartTest();
        }

        // ==================== CHAPTER DATA ====================
        const chapters = {

            1: `सभापति महोदय, मैं रक्षा मंत्रालय की माँगों का समर्थन करने के लिए खड़ा हुआ हूँ। वर्तमान घटनाओं से पता चलता है कि संसार का हर देश अपनी सुरक्षा के बारे में चिंतित है और उसके लिए हर प्रयत्न कर रहा है। इस दृष्टि से अन्य देशों की तरह हमारे देश में भी रक्षा मंत्रालय का महत्व है। मुझे इस बात की खुशी है कि जहाँ अन्य मंत्रालयों की उनके पिछले साल के कामों के बारे में काफी आलोचना हुई है, वहाँ इस मंत्रालय की कम आलोचना हुई है। इससे पता चलता है कि इस मंत्रालय ने पिछले साल अच्छा काम किया है। मोटे तौर पर किसी भी देश की सुरक्षा नीति का लक्ष्य यह होता है कि दूसरे देशों, खास तौर से पड़ोसी देशों, के साथ मित्रता के संबंध स्थापित किए जाएँ और उन पर एक दूसरे का आपसी विश्वास बना रहे, लेकिन उसके साथ यह भी जरूरी होता है कि हम अपने देश की सीमाओं की रक्षा करें। इसलिए हमारे देश का यह कर्तव्य हो जाता है कि हम अपने पड़ोसियों के कार्यों पर पूरी नजर रखें, क्योंकि आज तक हमारे देश पर जो संकट आए, वे हमारे पड़ोसियों से आए हैं। 1965 में पाकिस्तान के साथ जो लड़ाई हुई और उसके बाद ताशकंद में जो समझौता हुआ, वह सिर्फ कागज पर ही रहा, पाकिस्तान ने उस पर कोई अमल नहीं किया। इस दृष्टि से बहुत जरूरी है कि हम अपने देश की सुरक्षा की हर तरह से व्यवस्था करें। हमारा उद्देश्य दूसरों पर आक्रमण करना नहीं है, लेकिन यदि हम पर कोई आक्रमण करे, तो हम में इतनी शक्ति अवश्य होनी चाहिए कि हम उसका डटकर सामना कर सकें। आप जानते हैं कि पिछले दिनों पाकिस्तान को अमेरिका और चीन से काफी मदद मिली है। रक्षा मंत्रालय की रिपोर्ट में भी कहा गया है कि पिछले साल अमेरिका ने पाकिस्तान को 15 सौ करोड़ रुपये की फौजी सहायता दी है। आज जहाँ हम फौजी सामान के लिए अपने कारखानों की मदद से अपनी शक्ति बढ़ाने का प्रयत्न कर रहे हैं, वहीं पाकिस्तान संसार के देशों से फौजी सामान खरीद रहा है। अपनी नीति के कारण वह सब देशों से लाभ उठा रहा है। मेरा सुझाव है कि हम को भी अपनी शक्ति बढ़ाने के लिए संसार के अन्य देशों से अधिक से अधिक फौजी सामान खरीदना चाहिए। आज तिब्बत की सीमा पर चीन की डेढ़ लाख फौज खड़ी है।`,

            2: `सभापति महोदय, प्रतिदिन छोटी-मोटी झड़पें होती रहती हैं। हमारी फौज बड़े उत्साह से उनका मुकाबला करती है। उनके हौसले बहुत ऊँचे हैं। लेकिन हमारी सरकार का भी यह कर्तव्य है कि उनके हौसले कभी गिरने न दें। उन्हें हर तरह की सुविधा प्रदान की जाए, जिससे उनका आत्मविश्वास बढ़े। मैं मंत्री महोदय से अनुरोध करूँगा कि सरकार अपनी नीतियों के प्रचार का काम ठीक प्रकार से अपनी फौजों के करे, उन्हें अच्छे-अच्छे हथियार दे। अनुसूचित जातियों और आदिवासी जातियों के आयुक्त ने जो अपना प्रतिवेदन प्रस्तुत किया है, उस प्रतिवेदन को देखने से यह प्रतीत होता है कि इसको तैयार करने में उन्होंने बहुत परिश्रम से कार्य किया है। इसके लिए मैं उनको और उनके सहयोगियों को धन्यवाद देता हूँ। परंतु साथ ही साथ उस प्रतिवेदन के संबंध में कुछ आवश्यक निवेदन भी करना चाहता हूँ। पहली बात तो यह है कि इस प्रतिवेदन को देखने से ऐसा प्रतीत होता है कि इन कार्यों के लिए जिस धन का उपयोग होता है, वह तीन साधनों से उपलब्ध होता है—केंद्र सरकार द्वारा, राज्य सरकारों द्वारा और कुछ गैर-सरकारी संस्थाओं द्वारा। प्रतिवेदन के अनुसार जितना धन इन कार्यों पर व्यय करने के लिए दिया जाता है, उतना धन पूरी तरह से व्यय नहीं हो पाता। मैं यह नहीं कह सकता कि आवश्यकता से अधिक धन दिया जाता है या कार्यकर्ताओं को वह धन प्राप्त ही नहीं होता, जिसके कारण से वह बिना खर्च हुए बच जाता है। मैं तो यह चाहता हूँ कि जितना धन दिया जाता है उसका पूरा उपयोग हो। जहाँ तक राज्य सरकारों का संबंध है, बहुत-सी राज्य सरकारें अभी तक इस कार्य में असावधानी से काम ले रही हैं और इस कार्य को उपेक्षा की दृष्टि से देखती हैं। आयुक्त ने इस बात की शिकायत की है कि बहुत-सी राज्य सरकारों ने अनेक पत्र भेजने के बाद भी अभी तक अपनी रिपोर्ट नहीं भेजी है। मैं चाहता हूँ कि सरकार इस तरफ निष्पक्ष ध्यान दे, राज्य सरकारों पर दबाव डाला जाए कि वे इस दायित्व के प्रति सचेत हों और आयुक्त को उनके कार्य में पूरा-पूरा सहयोग प्रदान करें।`,

            3: `सभापति महोदय, किसानों की उपज की आप न अधिक कीमत दे सकते हैं न अधिक उपजाने के लिए जो साधन देश में उपलब्ध हैं उनकी तरफ आपका ध्यान जा रहा है। जो कुछ आप कर रहे हैं उससे अच्छा भविष्य नजर नहीं आ रहा है। मैं यही कहना चाहता हूँ कि आप देखें कि आपके कार्यक्रम में कहाँ त्रुटि है, कहाँ कमी है। आपने कर लगाना शुरू किया है, वह तो लगाना ही है, हमारे प्रदेश में तो जमीन पर 25 प्रतिशत ज्यादा कर भी लगा दिया गया है। इतना बोझ अगर किसान पर होगा तो उसकी कमर टूट जाएगी। हमारे उत्तर प्रदेश के कुछ जिले हैं, पूर्वी जिले हैं जहाँ पर बहुत बुरी स्थिति है। हमारे सदन के एक सदस्य ने रो-रो कर आपको यह बताया था कि वहाँ लोगों को दो रुपये मजदूरी में मिलता है, इतनी ही एक दिन की उनकी मजदूरी है।सरकार ने एक आयोग की नियुक्ति की थी ताकि वहाँ पर कुछ विकास के कार्य किए जाएँ, वह योजना भी अब खटाई में पड़ गई है। आपका ध्यान इन समस्त चीजों की ओर कैसे दिलाया जाए, समझ में नहीं आता है। यातायात के साधनों की स्थिति यह है कि ट्रेनों में दूसरे दर्जे में भीड़-भाड़ का कोई ठिकाना नहीं है। हर रोज ऐसा मालूम पड़ता है कि कोई मेला चल रहा है। आपके पास अच्छे इंजन हैं, लाइन भी अच्छी है, तो क्यों नहीं दूसरे डिब्बे अधिक लगाए जाते? लोगों को कुछ सुविधा मिल जाए वह काम नहीं किया जा रहा है। आपको किसान की, देहात में रहने वाले आदमी की, मजदूर की परवाह नहीं है जो समस्त कठिनाइयों को झेलता है। आपने बड़े-बड़े फार्म बना दिए हैं। क्या उन्हें आपके फार्म से कोई लाभ मिल रहा है?`,

            5: `उपाध्यक्ष महोदय, वित्तमंत्री को देश की आर्थिक स्थिति और निर्धनता के संबंध में जितनी जानकारी प्राप्त होती है, उतनी किसी अन्य मंत्री को प्राप्त नहीं होती। बजट बनाते समय वैसे तो बजट में आय-व्यय का ब्योरा होता है, लेकिन मूल रूप में देश की आर्थिक नीतियों में किस प्रकार का परिवर्तन तथा किस मार्ग पर वह देश को चलाना चाहते हैं, सरकार का लक्ष्य क्या है—इन सब नीतियों का बजट में विवरण होता है। हमारे वित्त मंत्री चाहे जिस पद पर भी रहे हों, चाहे वे मुख्यमंत्री रहे हों या केंद्र सरकार में रहे हों, उन्होंने शानदार काम किया। जिस समय उन्होंने बजट प्रस्तुत किया, उस समय देश को और विशेष रूप से गरीबी को उनसे बहुत-सी आशाएँ थीं। देश में लगभग 6 लाख गाँव हैं। उनमें जो बेरोजगारी है, गरीबी है, उसके संबंध में देश की जनता को उनसे बड़ी आशाएँ थीं और जनता देखना चाहती थी कि इस अवसर पर सरकारी नीतियों के द्वारा देश को वे क्या मार्गदर्शन देना चाहते हैं। इस दृष्टि से तीन महत्वपूर्ण बातें इस समय देश के सामने थीं—देश का आर्थिक विकास तेजी से हो, अधिक लोगों को काम मिल सके और मूल्यों में स्थिरता आए। जहाँ तक इन तीन उद्देश्यों का संबंध है, हमने देखा कि उस ओर कुछ प्रयत्न हुए हैं। विशेष रूप से गरीबी हटाओ के संबंध में इस बजट में कुछ सीमा तक उसका उल्लेख मिलता है, क्योंकि जितने भी प्रत्यक्ष कर लगाए जाते हैं वे ज्यादातर धनी लोगों पर और विशेष रूप से शहर के लोगों पर लगाए गए हैं। इस प्रकार से जो एक प्रकार की आर्थिक असमानता हमारे देश में चल रही है, उसको दूर करने का प्रयत्न अवश्य किया गया है।`

        }

        // ==================== ELEMENTS ====================
        const chapterSelect = document.getElementById("chapterSelect");
        const paragraph = document.getElementById("paragraph");
        const typingArea = document.getElementById("typingArea");
        const studentName = document.getElementById("studentName");
        const timeSelect = document.getElementById("timeSelect");
        const timer = document.getElementById("timer");
        const result = document.getElementById("result");
        const rName = document.getElementById("rName");
        const rWpm = document.getElementById("rWpm");
        const rErrors = document.getElementById("rErrors");
        const rAccuracy = document.getElementById("rAccuracy");
        const finalGrade = document.getElementById("finalGrade");

        let text = "", paraWords = [], timeLeft = 0, interval = null, paused = false;

        // ==================== CHAPTER DROPDOWN ====================
        for (let key in chapters) {
            let opt = document.createElement("option");
            opt.value = key;
            opt.innerText = `Chapter ${key}`;
            chapterSelect.appendChild(opt);
        }

        // ==================== LOAD CHAPTER (RESET LOGIC ADDED) ====================
        function loadChapter() {
            if (interval !== null) {
                clearInterval(interval);
                interval = null;
            }

            paused = false;
            timeLeft = parseInt(timeSelect.value);
            updateTimer();

            result.style.display = "none";
            rName.innerText = "";
            rWpm.innerText = "0";
            rErrors.innerText = "0";
            rAccuracy.innerText = "0";
            finalGrade.innerText = "";

            text = chapters[chapterSelect.value];
            paraWords = text.split(" ");
            paragraph.innerHTML = paraWords.map(w => `<span>${w} </span>`).join("");

            typingArea.value = "";
            typingArea.disabled = true;
        }

        chapterSelect.addEventListener("change", loadChapter);
        loadChapter();

        // ==================== START TEST ====================
        function startTest() {
            if (studentName.value.trim() === "") {
                alert("Please write a name");
                return;
            }

            if (interval !== null && !paused) return;

            if (interval === null) {
                timeLeft = parseInt(timeSelect.value);
                updateTimer();
            }

            paused = false;
            typingArea.disabled = false;
            typingArea.focus();

            if (interval === null) {
                interval = setInterval(() => {
                    if (!paused) {
                        timeLeft--;
                        updateTimer();
                        if (timeLeft <= 0) endTest();
                    }
                }, 1000);
            }
        }

        function pauseTest() {
            if (interval === null) return;
            paused = !paused;
        }

        function submitTest() {
            if (!interval) { alert("Test start नहीं हुआ"); return; }
            endTest();
        }

        function updateTimer() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timer.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // ==================== TYPING LOGIC ====================
        typingArea.addEventListener("input", () => {
            const typed = typingArea.value.trim().split(/\s+/);
            const spans = document.querySelectorAll("#paragraph span");

            spans.forEach((span, i) => {
                if (!typed[i]) span.className = "";
                else if (typed[i] === paraWords[i]) span.className = "correct";
                else span.className = "incorrect";
            });

            if (typed.length === paraWords.length && typed[typed.length - 1] === paraWords[paraWords.length - 1]) {
                endTest();
            }
        });

        // ==================== END TEST ====================
        function endTest() {
            clearInterval(interval);
            interval = null;
            typingArea.disabled = true;

            const typed = typingArea.value.trim().split(" ");
            let errors = 0;
            typed.forEach((w, i) => { if (w !== paraWords[i]) errors++; });

            let totalTime = parseInt(timeSelect.value) - timeLeft;
            let minutes = totalTime / 60 || 1;
            let wpm = Math.round(typed.length / minutes);
            let acc = typed.length ? Math.round(((typed.length - errors) / typed.length) * 100) : 0;

            rName.innerText = studentName.value;
            rWpm.innerText = wpm;
            rErrors.innerText = errors;
            rAccuracy.innerText = acc;
            finalGrade.innerText = getGrade(acc);
            result.style.display = "block";
        }

        // ==================== GRADE ====================
        function getGrade(acc) {
            if (acc >= 95) return "A+";
            if (acc >= 90) return "A";
            if (acc >= 80) return "B";
            if (acc >= 70) return "C";
            return "Needs Practice";
        }

        // ==================== BACKSPACE CONTROL ====================
        let backspaceDisabled = true;
        const backspaceBtn = document.getElementById("backspaceBtn");

        function toggleBackspace() {
            backspaceDisabled = !backspaceDisabled;
            backspaceBtn.innerText = backspaceDisabled ? "Backspace: OFF" : "Backspace: ON";
        }

        typingArea.addEventListener("keydown", function (e) {
            if (backspaceDisabled && e.key === "Backspace") {
                e.preventDefault();
            }
        });
    </script>

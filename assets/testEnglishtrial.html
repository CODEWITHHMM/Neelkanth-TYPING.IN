The Hon'ble High Court of Andhra Pradesh, in a significant observation, cautioned that while AI can be a helpful assistant, it can never replace the human intellect and the moral reasoning of a judge.

AI systems, which work on probability and data patterns, often "hallucinate" information that appears persuasive and authoritative but is factually incorrect. Relying on such non-existent authorities violates the basic principles of "due process" and could lead to a serious miscarriage of justice.

legal context, it refers to a situation where the law holds a person (the master or principal)

was not directly involved in the wrongdoing. This doctrine is deeply rooted in two ancient
Latin maxims. The first is "Qui facit per alium facit per se," which means "he who acts
through another is deemed in law to do it himself." The second is "Respondeat Superior,"
which translates to "let the master answer." For vicarious liability to arise, two essential

            10: `The narrative of modern Indian science is incomplete without the towering legacy of Dr.
Homi Jehangir Bhabha, a visionary physicist whose intellectual prowess and administrative
genius laid the foundation for the nation's scientific self-reliance. Often referred to as the
"Father of the Indian Nuclear Programme," Bhabha was not merely a scientist; he was a
dreamer who saw atomic energy as the ultimate solution to India's developmental challenges.
Born on October 30, 1909, into a wealthy and prominent Parsi family in Bombay (now
Mumbai), his life was a testament to the pursuit of excellence and the service of the state.
Bhabha's journey into the world of physics began far from the corridors of power. After
completing his schooling in Mumbai, he moved to the University of Cambridge, where he
initially studied Mechanical Engineering at the behest of his father. However, his passion for
the fundamental mysteries of the universe led him to theoretical physics. During the 1930s,
while working at the Cavendish Laboratory, Bhabha made significant contributions to the
understanding of cosmic rays. In 1935, he published a seminal paper on electron-positron
scattering, a phenomenon now internationally recognized in physics textbooks as "Bhabha
Scattering." His research during this period was prolific. In 1937, along with W. Heitler, he
proposed the "Cascade Theory" to explain the behavior of cosmic radiation as it enters the
Earth's atmosphere. These achievements earned him a Fellowship of the Royal Society (FRS)
at the young age of 31, cementing his reputation as a world-class theoretical physicist long
before he returned to India. The outbreak of World War II in 1939 found Bhabha in India on
holiday. Unable to return to Europe, he accepted a position at the Indian Institute of Science
(IISc) in Bangalore, working under the Nobel laureate Sir C.V. Raman. It was here that his
vision for a self-reliant India began to take shape. He realized that for a newly independent
nation to prosper, it required indigenous scientific institutions of the highest caliber. In 1945,
with the support of the Sir Dorabji Tata Trust, he founded the Tata Institute of Fundamental
Research (TIFR) in Mumbai. TIFR became the cradle of India's nuclear and mathematical
research. Following India's independence in 1947, Bhabha convinced Prime Minister
Jawaharlal Nehru to establish the Atomic Energy Commission (AEC) in 1948, serving as its
first chairman. His ability to bridge the gap between complex science and national policy was
unparalleled. Bhabha's most enduring strategic contribution was the formulation of India's
Three-Stage Nuclear Power Programme. Recognizing that India had limited uranium reserves but the world's largest deposits of thorium, he designed a roadmap to achieve long-term
energy security. In 1954, he established the Atomic Energy Establishment, Trombay (AEET),
which was later renamed the Bhabha Atomic Energy Centre (BARC) in his honor. He was
the force behind India's first nuclear reactor, Apsara, which went critical in August 1956,
marking a historic milestone for Asia. Tragically, Bhabha's life was cut short on January 24,
1966, when Air India Flight 101 crashed near Mont Blanc`,
            11: `For over 50,000 years, the Lonar crater has stood as a geological marvel a massive basaltic

water. A designated Ramsar wetland, the lake has historically maintained a chemistry so
extreme characterised by high salinity and a pH level of 11.5 that it remained a world apart.

microbes and biodiversity. That uniqueness faced an existential shock last year when fish
were spotted in the lake for the first time in recorded history. But what began as a scientific
curiosity has escalated into an environmental emergency. As water levels continue to surge,
the Nagpur bench of the Bombay high court has taken suo motu notice, demanding answers
as to why one of India's most significant natural monuments is being irreversibly altered. The
physical evidence of the crisis is visible to any visitor descending the crater's steep rim. Nine
of the 15 ancient temples that dot the shoreline relics of a medieval architectural era are now
partially or fully underwater. The lake is growing but, in doing so, it is losing its soul." The
cause of this "flooding" in a closed-basin lake is not merely heavy rainfall, but a complex
"perfect storm" of human intervention. He found that the lake level has risen by 20 feet a
change driven by an inadvertent breach of the crater's natural plumbing. As fresh
groundwater slowly percolates through the rock, it dilutes the lake's concentrated salts and
minerals. The pH has plummeted from 11.5 to nearly 8.5. "This dilution erases the very
conditions that make Lonar unique. This isn't just a change in water level; it's a fundamental
shift in chemistry that will trigger a domino effect across the flora, fauna, and
microorganisms that have evolved here for over 500 centuries." While the lake overflows
with fresh water, Lonar village perched at the crater's edge is bone dry. 40% of Lonar village
is built directly on the "ejecta blanket" the debris field created by the original meteor impact.
We have failed to recognise the holistic importance of this site. In Lonar, we have allowed
roads, agriculture, fertilizers, and pesticides to encroach upon the ejecta zone. Every time a
new road is built or a new field is ploughed on the rim, the crater suffers." The govt's attempt
to fix this by acquiring 86 hectares of land for research and conservation has stalled. While
the Maharashtra govt has long lobbied for Unesco World Heritage status for Lonar, the reality

department is awaiting a detailed report from the groundwater surveys and development

            12: `The journey from Sister Nivedita, who designed the first national flag (the Vajra Flag), to
Naveen Jindal reflects a remarkable continuity in India's democratic imagination. In 1947,
Hansa Mehta presented the national flag as a tribute to the contribution of the women of India
to the Constitution making process, recognising the tricolour as a symbol of equality,
inclusion, and constitutional belonging. Decades later, Naveen Jindal, drawing inspiration
from this foundational vision, fought to make the flag a living part of India's democratic
identity. Naveen Jindal's-and numerous others'-contributions remind us that the national flag
is not merely a symbolic object of the state but a shared constitutional inheritance that binds
citizens through rights, responsibilities, and democratic participation. India's tryst with the
tricolour began on July 22, 1947, when we received our national flag. The struggle for India's
independence gave Indians a new symbol and meaning to the national flag. The journey of
the tricolour has deep philosophical and emotional meaning to Indians. Since our
independence, the national flag has been seen as a revered symbol but not necessarily a living
and breathing civic right. The extraordinary transformation of the Indian national flag from a
state-controlled symbol into a citizen's constitutional right was a gradual process that was
contested, yet truly democratic. January 23, 2026, marks the 22nd anniversary of the
landmark judgment of the Supreme Court of India in Union of India v. Naveen Jindal. The
Court, invoking its constitutional jurisdiction, recognised the fundamental right to fly the
national flag as part of the freedom of speech and expression. Last year also marked two
milestones the 30th anniversary of the judgment of the Delhi High Court in Naveen Jindal v.
Union of India, delivered on September 22, 1995, which upheld the right to hoist the national
flag all year around and the 20th anniversary of the parliamentary amendment to the
Prevention of Insults to National Honour Act, 1971, that enabled the citizen to respectfully
display the National Flag in clothing and apparels. Hence, we need to recognise that January
23 stands at the confluence of history, law, legislative process, and civic engagement, all of
which together marked the milestone in the journey of democratisation of India's national
flag. The Supreme Court held that the right to fly the national flag with respect and dignity is
part of the fundamental right to freedom of speech and expression. Today, every Indian
citizen can respectfully display the national flag not just on national holidays, but all year
round. The legal and constitutional recognition of the right to fly the national flag resulted in something even more remarkable. It was recognised quite rightly that judicial recognition
alone does not mean democratisation. It has to be taken to the people of India, to whom it
belongs in the first place. This year marks a significant achievement for the Foundation when
it celebrates the installation of 200 monumental National Flags across India. The act of flying
the National Flag is an act of civic responsibility. Respectfully flying`,
            13: `Trade is no longer a neutral instrument of prosperity; it is once again a language of power.
When market access can be tightened at short notice and tariffs are used to signal political
intent, economies are forced to treat commerce as strategy. That was the backdrop to the New
Delhi visit of European Commission President Ursula von der Leyen and European Council
President Antonio Costa for the EU-India Summit around Republic Day. India and the EU
have concluded negotiations on the long-delayed Free Trade Agreement, with legal scrubbing
and ratification still ahead. India has recently signed trade pacts with the UK, Oman, and
New Zealand, and is committed to boosting trade with the UAE to over USD200 billion by
2032. This will be India's 9th trade deal in four years, showing a strategy to secure market
access amid mounting global protectionism. Some 6,000 European companies are in India.
The FTA allows the EU to diversify supply chains, reduce reliance on China, and engage
with India's USD4.2 trillion economy. The EU will benefit from tariff reductions on wine,
automobiles, and chemicals. Both sides excluded agriculture and dairy products to address
India's concerns about 700 million farmers. Trade discussions resumed in 2022 after a
nine-year hiatus and gained urgency after U.S. President Donald Trump doubled tariffs on
Indian goods to 50% in August 2025, prompting India to seek alternative export markets. The
European Union (EU) is one of India's main trading partners, along with the United States
and China. In 2024-25, total trade between India and the EU exceeded USD190 billion.
During this time, India exported about USD76 billion in goods and USD30 billion in services
to EU member countries. The average EU tariff on Indian products is 3.8%, but
labour-intensive sectors face 10% duties. The agreement could create a market of 2 billion
people, nearly equal to the combined populations of India and China. This vast consumer
base accounts for almost a quarter of global GDP. A military contingent from the EU,
featuring the military staff flag and the flags of the naval operations Atalanta and Aspides,
participated in the Republic Day parade. It was the EU's first participation in such an event
outside Europe. The agreement could take at least a year to be ratified, but it might
significantly expand trade and boost Indian exports, especially textiles and jewellery, which
face 50 per cent US tariffs. Negotiations on investment protection and geographical
indications are separate, allowing the FTA to focus on goods, services, and trade rules. EU
chief Ursula von der Leyen said at Davos: "We are on the cusp of a historic trade agreement." India's main concerns are the EU's carbon border levy and non-tariff barriers, for example,
regulatory delays and stringent standards. To better understand the potential impact of the
carbon border levy, scenario planning could be useful. A best-case scenario might see only
minimal cost increases for Indian exporters, while a worst-case scenario might involve
significant financial burdens, making Indian goods less competitive in the EU market.`,
            14: `Situated in the historically fertile region of Saurashtra (Kathiwar), Somnath, also known as

            16: `This Appeal is filed under Section 173 of the Motor Vehicles Act, 1988, against the award
and decree dated 14.08.2024 passed in M.V.O.P. No. 512 of 2021 on the file of the Motor
Accident Claims Tribunal-cum-VI Additional District Judge, Guntur. The appellants, who
are the legal representatives of the deceased T. Rama Rao, seek enhancement of the
compensation awarded by the Tribunal. The brief facts of the case are that on 12.11.2020, at
about 08:30 PM, while the deceased was returning to his village on his motorcycle bearing
No. AP-07-BK-1102, a Lorry bearing No. AP-07-TJ-4452, driven by its driver in a rash and
negligent manner at high speed, hit the motorcycle from the rear side near the National
Highway-16 junction. As a result, the deceased sustained grievous head injuries and died on
the spot. The police registered a case in Crime No. 245 of 2020 under Section 304-A of the
Indian Penal Code (IPC). At the time of the accident, the deceased was aged 38 years and
was earning Rs. 25,000/- per month as a Senior Supervisor in a private spinning mill. The
learned counsel for the appellants, Sri P. Venkata Rao, argues that the Tribunal erred in fixing
the notional income of the deceased at only Rs. 10,000/- per month. He submits that the
Tribunal failed to add "Future Prospects" as per the law laid down by the Constitution Bench
of the Supreme Court in "National Insurance Company Limited vs. Pranay Sethi," reported in
(2017) 16 SCC 680. He further contends that the compensation awarded under the heads of
"Loss of Consortium" and "Loss of Estate" is on the lower side. On the other hand, the
learned Standing Counsel for the 2nd Respondent-Insurance Company argues that the
claimants failed to produce any valid salary certificate or bank statement to prove that the
deceased was earning Rs. 25,000/- per month. He further submits that there was
"Contributory Negligence" on the part of the deceased as he was not wearing a helmet at the
time of the accident. Therefore, the Insurance Company maintains that the award passed by
the Tribunal is just and reasonable. After hearing both parties and perusing the record, this
Court finds that the Tribunal's assessment of income was indeed conservative. Even for an
unskilled laborer, the minimum wage in 2020 was around Rs. 13,000. Considering the age of
the deceased as 38 years, a multiplier of "15" is applicable as per the "Sarla Verma" case.
Furthermore, 40% of the income must be added towards future prospects since the deceased
was below 40 years of age. Regarding the "Helmet" issue, the Supreme Court has clarified
that non-wearing of a helmet may lead to a small deduction but does not absolve the offending vehicle of its negligence. A secondary issue raised by the Insurance Company
pertains to the "Invalid Driving License" of the offending lorry driver. It is argued that the
driver possessed a license for "Light Motor Vehicles" but was operating a "Heavy Goods
Vehicle" at the time`,

            19: `A densely packed pilgrimage centre began surrounding what was once a secretive and

            21: `This matter brings into focus the "Doctrine of Promissory Estoppel," a legal principle rooted
in the concepts of equity and justice. In simple terms, this doctrine prevents a person or a
government authority from going back on a promise made to another party, especially when
that party has acted upon the promise and changed their position to their own detriment.
Unlike a traditional contract, which requires a "consideration" (something in return),
promissory estoppel allows a party to recover on a promise even if a formal contract does not
exist. It is a shield used to prevent "Manifest Injustice" when a party has been misled by a
representation of fact or a future intention. The origin of this doctrine in Indian law is closely
linked to the landmark judgment of the Supreme Court in "Motilal Padampat Sugar Mills vs.
State of Uttar Pradesh," reported in AIR 1979 SC 621. In this case, the Court held that if the
Government makes a promise, knowing that it would be acted upon by the citizen, and the
citizen does, in fact, act upon it, the Government is bound by that promise. The Court
observed that the "Rule of Law" requires the State to be as much bound by its words as a
private citizen. In 2026, this doctrine is frequently invoked by industries that set up plants
based on "Government Incentive Schemes" only to find that the benefits are withdrawn
before the promised period ends. For a petitioner to successfully invoke the Doctrine of
Promissory Estoppel, several essential conditions must be met. First, there must be a clear
and "Unambiguous Promise" or representation. Second, the person making the promise must
have intended for it to be acted upon. Third, the person to whom the promise was made must
have actually changed their position—usually by spending money, selling property, or
entering into other obligations based on that promise. This change of position is technically
known as "Detrimental Reliance." If a person merely hears a promise but does nothing about
it, they cannot later sue the promisor. However, there are certain "Exceptions" to this doctrine
that the High Court's strictly follow. First, promissory estoppel cannot be used against the
"Statute" or the law. If a government official makes a promise that is contrary to an existing
Act passed by the Legislature, that promise is void from the beginning (void ab initio), and
the doctrine cannot be used to enforce it. Second, the doctrine cannot be invoked against the
"Sovereign Functions" of the State, such as taxation or national security. For example, the
Government cannot be stopped from changing tax rates in the public interest, even if a
previous official suggested the rates would stay low. This is because "Public Interest" always overrides private expectation. In the context of the Andhra Pradesh High Court, a trending
application of this doctrine involves "Agricultural Subsidies" and "Industrial Power Tariffs."

            22: `The Latin term "Quo Warranto" literally means "by what authority." Under Article 226 of the

ineligible for the post. For a Writ of Quo Warranto to be issued, the Court must be satisfied
that the office in question is of a "Public Nature" and was created by a statute or the
Constitution. Furthermore, the person holding the office must be shown to be a "Usurper"
who has occupied the post without the sanction of law. In the landmark case of "University of
Mysore vs. Govinda Rao," reported in AIR 1965 SC 491, the Hon'ble Supreme Court held
that the court must be slow to interfere in academic appointments unless there is a clear

        // ==================== ELEMENTS ====================
        const chapterSelect = document.getElementById("chapterSelect");
        const paragraph = document.getElementById("paragraph");
        const typingArea = document.getElementById("typingArea");
        const studentName = document.getElementById("studentName");
        const timeSelect = document.getElementById("timeSelect");
        const timer = document.getElementById("timer");
        const result = document.getElementById("result");
        const rName = document.getElementById("rName");
        const rWpm = document.getElementById("rWpm");
        const rErrors = document.getElementById("rErrors");
        const rAccuracy = document.getElementById("rAccuracy");
        const finalGrade = document.getElementById("finalGrade");

        let text = "", paraWords = [], timeLeft = 0, interval = null, paused = false;

        // ==================== CHAPTER DROPDOWN ====================
        for (let key in chapters) {
            let opt = document.createElement("option");
            opt.value = key;
            opt.innerText = `Chapter ${key}`;
            chapterSelect.appendChild(opt);
        }

        // ==================== LOAD CHAPTER (RESET LOGIC ADDED) ====================
        function loadChapter() {
            if (interval !== null) {
                clearInterval(interval);
                interval = null;
            }

            paused = false;
            timeLeft = parseInt(timeSelect.value);
            updateTimer();

            result.style.display = "none";
            rName.innerText = "";
            rWpm.innerText = "0";
            rErrors.innerText = "0";
            rAccuracy.innerText = "0";
            finalGrade.innerText = "";

            text = chapters[chapterSelect.value];
            paraWords = text.split(" ");
            paragraph.innerHTML = paraWords.map(w => `<span>${w} </span>`).join("");

            typingArea.value = "";
            typingArea.disabled = true;
        }

        chapterSelect.addEventListener("change", loadChapter);
        loadChapter();

        // ==================== START TEST ====================
        function startTest() {
            if (studentName.value.trim() === "") {
                alert("Please write name");
                return;
            }

            if (interval !== null && !paused) return;

            if (interval === null) {
                timeLeft = parseInt(timeSelect.value);
                updateTimer();
            }

            paused = false;
            typingArea.disabled = false;
            typingArea.focus();

            if (interval === null) {
                interval = setInterval(() => {
                    if (!paused) {
                        timeLeft--;
                        updateTimer();
                        if (timeLeft <= 0) endTest();
                    }
                }, 1000);
            }
        }

        function pauseTest() {
            if (interval === null) return;
            paused = !paused;
        }

        function submitTest() {
            if (!interval) { alert("Test start नहीं हुआ"); return; }
            endTest();
        }

        function updateTimer() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timer.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // ==================== TYPING LOGIC ====================
        typingArea.addEventListener("input", () => {
            const typed = typingArea.value.trim().split(/\s+/);
            const spans = document.querySelectorAll("#paragraph span");

            spans.forEach((span, i) => {
                if (!typed[i]) span.className = "";
                else if (typed[i] === paraWords[i]) span.className = "correct";
                else span.className = "incorrect";
            });

            if (typed.length === paraWords.length && typed[typed.length - 1] === paraWords[paraWords.length - 1]) {
                endTest();
            }
        });

        // ==================== END TEST ====================
        function endTest() {
            clearInterval(interval);
            interval = null;
            typingArea.disabled = true;

            const typed = typingArea.value.trim().split(" ");
            let errors = 0;
            typed.forEach((w, i) => { if (w !== paraWords[i]) errors++; });

            let totalTime = parseInt(timeSelect.value) - timeLeft;
            let minutes = totalTime / 60 || 1;
            let wpm = Math.round(typed.length / minutes);
            let acc = typed.length ? Math.round(((typed.length - errors) / typed.length) * 100) : 0;

            rName.innerText = studentName.value;
            rWpm.innerText = wpm;
            rErrors.innerText = errors;
            rAccuracy.innerText = acc;
            finalGrade.innerText = getGrade(acc);
            result.style.display = "block";
        }

        // ==================== GRADE ====================
        function getGrade(acc) {
            if (acc >= 95) return "A+";
            if (acc >= 90) return "A";
            if (acc >= 80) return "B";
            if (acc >= 70) return "C";
            return "Needs Practice";
        }

        // ==================== BACKSPACE CONTROL ====================
        let backspaceDisabled = true;
        const backspaceBtn = document.getElementById("backspaceBtn");

        function toggleBackspace() {
            backspaceDisabled = !backspaceDisabled;
            backspaceBtn.innerText = backspaceDisabled ? "Backspace: OFF" : "Backspace: ON";
        }

        typingArea.addEventListener("keydown", function (e) {
            if (backspaceDisabled && e.key === "Backspace") {
                e.preventDefault();
            }
        });
    </script>

                2: `This matter involves a detailed discussion on the "Doctrine of Adverse Possession," a legal principle that allows a person to claim legal ownership of a property based on continuous and uninterrupted occupation. Under the law of property in India, specifically the Limitation Act, 1963, if a person remains in possession of an immovable property for a specific period of time, the right of the original owner to reclaim that property is extinguished. The period of limitation prescribed for a private individual to file a suit for recovery of possession is 12 years under Article 65 of the Schedule to the Limitation Act. For properties belonging to the Government or the State, this period is extended to 30 years. The core of this doctrine is based on the idea that "the law helps the vigilant and not the indolent." If an owner neglects their property and allows a stranger to occupy it for more than a decade without any objection, the law presumes that the owner has abandoned their rights. However, claiming adverse possession is not an easy task. It is a "hostile" claim that works against the true owner. This means the possession must be adequate in continuity, adequate in publicity, and adverse to the true owner. First, the possession must be "open and notorious," meaning it should not be a secret occupation. The community and the true owner should be able to see that the person is treating the land as their own. Second, the possession must be "continuous" without any significant break. If the occupant leaves the property for a year and then comes back, the 12-year "limitation clock" resets to zero. Third, the possession must be "hostile," which in legal terms does not mean violence, but simply means that the occupant does not have the owner's permission. If a person is staying on the land as a tenant or with the owner's consent, they can never claim adverse possession, no matter how many years they stay there. This is because "permissive possession" can                 6: `In the world of business and law, the term "Force Majeure" has become one of the most significant and frequently debated concepts of the current decade. Derived from the French language, it literally translates to "Superior Force." In legal terms, a force majeure clause is a provision in a contract that excuses a party from performing their contractual obligations when an extraordinary and unforeseen event occurs that is beyond their control. Such events typically include natural disasters like earthquakes or floods, wars, strikes, and most recently, global health pandemics. Under the Indian Contract Act, 1872, the principles of force majeure are often read alongside Section 56, which deals with the "Doctrine of Frustration." The real-world impact of this vocabulary was most visible during the years following 2020. In 2026, the High Courts across India are still dealing with the "Aftershocks" of commercial disputes where one party was unable to pay rent or deliver goods due to lockdown restrictions. A classic example can be seen in the case of "Halliburton Offshore Services Inc. vs. Vedanta Limited," where the Delhi High Court observed that a pandemic could indeed be considered a force majeure event. However, the Court also clarified a very important point: a party cannot use force majeure as an "excuse" just because the contract has become difficult or more expensive to perform. The event must be so severe that it makes the performance of the contract "impossible." For a force majeure claim to be successful in a court of law, four essential criteria must be met. First, the event must be "external," meaning it was not caused by either party. Second, the event must be "unforeseeable" at the time the contract was signed. If a company signs a construction contract in a flood-prone area during the monsoon season, they cannot later claim a regular rainstorm as a force majeure event. Third, the event must make the performance of the task truly impossible. Fourth, the party seeking relief must show that they took "All Reasonable Steps" to mitigate the loss or find an alternative way to fulfill the contract. The "Burden of Proof" lies entirely on the party that is failing to perform. In the context of Andhra Pradesh, the High Court recently dealt with a case involving a large "Solar Power Project" in the Rayalaseema region. The construction company argued that a sudden and unprecedented increase in the global price of solar panels, caused by international trade conflicts, constituted a force majeure event. However, the Court, following the "Satyabrata Ghose vs. Mugneeram" principle, held that a mere change in "Market Economics" or a rise in prices does not frustrate a contract. Business risks are part of every commercial deal, and the "Sanctity of Contract" must be protected unless there is a total destruction of the subject matter. Furthermore, it is important to understand that "Force Majeure" is a "creature of contract." This means that the court will first look at how the specific clause is written in the agreement. Some`,

                7: `The law of torts in India is primarily based on the principle that every person is responsible for their own actions. However, the "Doctrine of Vicarious Liability" serves as a significant exception to this general rule. The term "Vicarious" means acting or done for another. In a legal context, it refers to a situation where the law holds a person (the master or principal) liable for the wrongful acts or omissions of another (the servant or agent), even if the master was not directly involved in the wrongdoing. This doctrine is deeply rooted in two ancient Latin maxims. The first is "Qui facit per alium facit per se," which means "he who acts through another is deemed in law to do it himself." The second is "Respondeat Superior," which translates to "let the master answer." For vicarious liability to arise, two essential conditions must be fulfilled. First, there must be a specific relationship of "Master and Servant" or "Principal and Agent." Second, the wrongful act must have been committed by the servant "during the course of employment." As we look at the judicial landscape of 2026, the definition of what constitutes the "course of employment" is expanding. For instance, if a delivery driver for a prominent e-commerce company like Amazon or Flipkart causes an accident while delivering a package, the company is vicariously liable. This is because the driver was performing a task authorized by the employer. However, if the same driver takes the company vehicle for a personal "joyride" or a private errand completely unrelated to work, the employer is usually not liable. In legal terminology, this is known as a "Frolic and Detour." A landmark real-world example that shaped this doctrine in India is the case of "State of Rajasthan vs. Mst. Vidhyawati," reported in AIR 1962 SC 933. In this case, a driver employed by the State Government was bringing back a government jeep from a repair workshop. Due to his rash and negligent driving, he hit a pedestrian, who later died from the injuries. The Supreme Court of India held that the State was vicariously liable for the driver's negligence. The Court observed that since the driver was acting within the scope of his employment, the Government could not escape its responsibility. This case established that in a "Welfare State," the government is just as accountable for the negligence of its employees as any private employer. In recent years, particularly in 2025 and 2026, the High Courts have applied this doctrine to the "Medical Profession" as well. In cases of surgical errors or diagnostic failures, hospitals are frequently held vicariously liable for the negligence of their doctors and nursing staff. The Courts follow the "Control Test" to determine the relationship. If the hospital exercises control over the doctor's schedule, provides the equipment, and pays a regular salary, the doctor is considered an employee, and the hospital must bear the "Financial Burden" of any malpractice. This ensures that the victims receive adequate compensation from an institution with`,

period of six months. Consequently, the 1st defendant cancelled the agreement vide a reply notice dated 25.01.2017 and forfeited the advance amount. The 1st respondent further argues that the property prices in the area had escalated to Rs. 80,00,000- per acre by 2018, and granting specific performance at the old rate would cause "Hardship" to the seller. After perusing the evidence of PW-1 and DW-1, this Court finds that the Trial Court failed to appreciate the "Doctrine of Part Performance." The plaintiff was already put in possession of a portion of the land measuring Acre 0.50 Cents immediately after the advance payment. Furthermore, the 1st defendant had not cleared the "Encumbrance Certificate" (EC) and the "Adangal" records, which was a pre-condition for the final registration. It is a well-settled principle that a party cannot take advantage of its own default. In the case of "Mademsetty Satyanarayana vs. G. Yelloji Rao," reported in AIR 1965 SC 1405, the Supreme Court held that mere delay does not deprive a`,

            10: `The narrative of modern Indian science is incomplete without the towering legacy of Dr. Homi Jehangir Bhabha, a visionary physicist whose intellectual prowess and administrative genius laid the foundation for the nation's scientific self-reliance. Often referred to as the "Father of the Indian Nuclear Programme," Bhabha was not merely a scientist; he was a dreamer who saw atomic energy as the ultimate solution to India's developmental challenges. Born on October 30, 1909, into a wealthy and prominent Parsi family in Bombay (now Mumbai), his life was a testament to the pursuit of excellence and the service of the state. Bhabha's journey into the world of physics began far from the corridors of power. After completing his schooling in Mumbai, he moved to the University of Cambridge, where he initially studied Mechanical Engineering at the behest of his father. However, his passion for the fundamental mysteries of the universe led him to theoretical physics. During the 1930s, while working at the Cavendish Laboratory, Bhabha made significant contributions to the understanding of cosmic rays. In 1935, he published a seminal paper on electron-positron scattering, a phenomenon now internationally recognized in physics textbooks as "Bhabha Scattering." His research during this period was prolific. In 1937, along with W. Heitler, he proposed the "Cascade Theory" to explain the behavior of cosmic radiation as it enters the Earth's atmosphere. These achievements earned him a Fellowship of the Royal Society (FRS) at the young age of 31, cementing his reputation as a world-class theoretical physicist long before he returned to India. The outbreak of World War II in 1939 found Bhabha in India on holiday. Unable to return to Europe, he accepted a position at the Indian Institute of Science (IISc) in Bangalore, working under the Nobel laureate Sir C.V. Raman. It was here that his vision for a self-reliant India began to take shape. He realized that for a newly independent nation to prosper, it required indigenous scientific institutions of the highest caliber. In 1945, with the support of the Sir Dorabji Tata Trust, he founded the Tata Institute of Fundamental Research (TIFR) in Mumbai. TIFR became the cradle of India's nuclear and mathematical research. Following India's independence in 1947, Bhabha convinced Prime Minister Jawaharlal Nehru to establish the Atomic Energy Commission (AEC) in 1948, serving as its first chairman. His ability to bridge the gap between complex science and national policy was unparalleled. Bhabha's most enduring strategic contribution was the formulation of India's Three-Stage Nuclear Power Programme. Recognizing that India had limited uranium reserves but the world's largest deposits of thorium, he designed a roadmap to achieve long-term energy security. In 1954, he established the Atomic Energy Establishment, Trombay (AEET), which was later renamed the Bhabha Atomic Energy Centre (BARC) in his honor. He was the force behind India's first nuclear reactor, Apsara, which went critical in August 1956, marking a historic milestone for Asia. Tragically, Bhabha's life was cut short on January 24, 1966, when Air India Flight 101 crashed near Mont Blanc`,

            11: `For over 50,000 years, the Lonar crater has stood as a geological marvel a massive basaltic bowl carved by a meteoric impact and a rare Earth-based analogue for the surface of Mars. But today, this unique ecosystem is being undone by the very element that sustains life: water. A designated Ramsar wetland, the lake has historically maintained a chemistry so extreme characterised by high salinity and a pH level of 11.5 that it remained a world apart. No fish could survive its caustic embrace; instead, it hosted a unique kingdom of specialised microbes and biodiversity. That uniqueness faced an existential shock last year when fish were spotted in the lake for the first time in recorded history. But what began as a scientific curiosity has escalated into an environmental emergency. As water levels continue to surge, the Nagpur bench of the Bombay high court has taken suo motu notice, demanding answers as to why one of India's most significant natural monuments is being irreversibly altered. The physical evidence of the crisis is visible to any visitor descending the crater's steep rim. Nine of the 15 ancient temples that dot the shoreline relics of a medieval architectural era are now partially or fully underwater. The lake is growing but, in doing so, it is losing its soul." The cause of this "flooding" in a closed-basin lake is not merely heavy rainfall, but a complex "perfect storm" of human intervention. He found that the lake level has risen by 20 feet a change driven by an inadvertent breach of the crater's natural plumbing. As fresh groundwater slowly percolates through the rock, it dilutes the lake's concentrated salts and minerals. The pH has plummeted from 11.5 to nearly 8.5. "This dilution erases the very conditions that make Lonar unique. This isn't just a change in water level; it's a fundamental shift in chemistry that will trigger a domino effect across the flora, fauna, and microorganisms that have evolved here for over 500 centuries." While the lake overflows with fresh water, Lonar village perched at the crater's edge is bone dry. 40% of Lonar village is built directly on the "ejecta blanket" the debris field created by the original meteor impact. We have failed to recognise the holistic importance of this site. In Lonar, we have allowed roads, agriculture, fertilizers, and pesticides to encroach upon the ejecta zone. Every time a new road is built or a new field is ploughed on the rim, the crater suffers." The govt's attempt to fix this by acquiring 86 hectares of land for research and conservation has stalled. While the Maharashtra govt has long lobbied for Unesco World Heritage status for Lonar, the reality on the ground remains a far cry from international standards. Basic infrastructure from public washrooms to scientific interpretation centres remains abysmal. Currently, the forest department is awaiting a detailed report from the groundwater surveys and development agency. Farmers in the surrounding catchment area have drilled borewells to depths of 600-700 feet. These wells`,

           12: `The journey from Sister Nivedita, who designed the first national flag (the Vajra Flag), to Naveen Jindal reflects a remarkable continuity in India's democratic imagination. In 1947, Hansa Mehta presented the national flag as a tribute to the contribution of the women of India to the Constitution making process, recognising the tricolour as a symbol of equality, inclusion, and constitutional belonging. Decades later, Naveen Jindal, drawing inspiration from this foundational vision, fought to make the flag a living part of India's democratic identity. Naveen Jindal's-and numerous others'-contributions remind us that the national flag is not merely a symbolic object of the state but a shared constitutional inheritance that binds citizens through rights, responsibilities, and democratic participation. India's tryst with the tricolour began on July 22, 1947, when we received our national flag. The struggle for India's independence gave Indians a new symbol and meaning to the national flag. The journey of the tricolour has deep philosophical and emotional meaning to Indians. Since our independence, the national flag has been seen as a revered symbol but not necessarily a living and breathing civic right. The extraordinary transformation of the Indian national flag from a state-controlled symbol into a citizen's constitutional right was a gradual process that was contested, yet truly democratic. January 23, 2026, marks the 22nd anniversary of the landmark judgment of the Supreme Court of India in Union of India v. Naveen Jindal. The Court, invoking its constitutional jurisdiction, recognised the fundamental right to fly the national flag as part of the freedom of speech and expression. Last year also marked two milestones the 30th anniversary of the judgment of the Delhi High Court in Naveen Jindal v. Union of India, delivered on September 22, 1995, which upheld the right to hoist the national flag all year around and the 20th anniversary of the parliamentary amendment to the Prevention of Insults to National Honour Act, 1971, that enabled the citizen to respectfully display the National Flag in clothing and apparels. Hence, we need to recognise that January 23 stands at the confluence of history, law, legislative process, and civic engagement, all of which together marked the milestone in the journey of democratisation of India's national flag. The Supreme Court held that the right to fly the national flag with respect and dignity is part of the fundamental right to freedom of speech and expression. Today, every Indian citizen can respectfully display the national flag not just on national holidays, but all year round. The legal and constitutional recognition of the right to fly the national flag resulted in something even more remarkable. It was recognised quite rightly that judicial recognition alone does not mean democratisation. It has to be taken to the people of India, to whom it belongs in the first place. This year marks a significant achievement for the Foundation when it celebrates the installation of 200 monumental National Flags across India. The act of flying the National Flag is an act of civic responsibility. Respectfully flying`,

            13: `Trade is no longer a neutral instrument of prosperity; it is once again a language of power. When market access can be tightened at short notice and tariffs are used to signal political intent, economies are forced to treat commerce as strategy. That was the backdrop to the New Delhi visit of European Commission President Ursula von der Leyen and European Council President Antonio Costa for the EU-India Summit around Republic Day. India and the EU have concluded negotiations on the long-delayed Free Trade Agreement, with legal scrubbing and ratification still ahead. India has recently signed trade pacts with the UK, Oman, and New Zealand, and is committed to boosting trade with the UAE to over USD200 billion by 2032. This will be India's 9th trade deal in four years, showing a strategy to secure market access amid mounting global protectionism. Some 6,000 European companies are in India. The FTA allows the EU to diversify supply chains, reduce reliance on China, and engage with India's USD4.2 trillion economy. The EU will benefit from tariff reductions on wine, automobiles, and chemicals. Both sides excluded agriculture and dairy products to address India's concerns about 700 million farmers. Trade discussions resumed in 2022 after a nine-year hiatus and gained urgency after U.S. President Donald Trump doubled tariffs on Indian goods to 50% in August 2025, prompting India to seek alternative export markets. The European Union (EU) is one of India's main trading partners, along with the United States and China. In 2024-25, total trade between India and the EU exceeded USD190 billion. During this time, India exported about USD76 billion in goods and USD30 billion in services to EU member countries. The average EU tariff on Indian products is 3.8%, but labour-intensive sectors face 10% duties. The agreement could create a market of 2 billion people, nearly equal to the combined populations of India and China. This vast consumer base accounts for almost a quarter of global GDP. A military contingent from the EU, featuring the military staff flag and the flags of the naval operations Atalanta and Aspides, participated in the Republic Day parade. It was the EU's first participation in such an event outside Europe. The agreement could take at least a year to be ratified, but it might significantly expand trade and boost Indian exports, especially textiles and jewellery, which face 50 per cent US tariffs. Negotiations on investment protection and geographical indications are separate, allowing the FTA to focus on goods, services, and trade rules. EU chief Ursula von der Leyen said at Davos: "We are on the cusp of a historic trade agreement." India's main concerns are the EU's carbon border levy and non-tariff barriers, for example, regulatory delays and stringent standards. To better understand the potential impact of the carbon border levy, scenario planning could be useful. A best-case scenario might see only minimal cost increases for Indian exporters, while a worst-case scenario might involve significant financial burdens, making Indian goods less competitive in the EU market.`,

            14: `Who Builds Somanath & What History Tells Us? Situated in the historically fertile region of Saurashtra (Kathiawar), Somnath, also known as Prabhas Patan, was associated with Veraval, one of the important ports among several that dot the Gujarat coast. Like Prayagraj (also known as Allahabad), Somnath or Prabhas Patan is located at the confluence of three rivers — Hiran, Kapila and the mythical Saraswati. Archaeological excavations carried out in 1955–57, 1975–77, and in the early 1990s at nearby Datrana village take its human history to the pre-Harappan period (more than 2800 years BC). The later periods are evidenced by Lustrous Red Ware, a Gujarat specialty, iron artifacts, as well as Northern Black Polished Ware which also shows linkages with the Ganga valley. Maritime trade links are indicated by the discovery of amphorae sherds from the Hellenistic world. Therefore, Somnath on the western coast was an active place where trade from the sea moved through Junagadh and joined the land-based trade routes going up to present-day Kutch and then into Sindh and further northwards. A contemporary account by Al Biruni, Mahmud's chronicler, supports this possibility as Biruni clearly writes that the temple of Somanatha was built 100 years before Mahmud sacked it. This is quite possible as the adjacent site of Prabhas was considered sacred. Hemachandra (1088 to 1172 CE), the great Shwetambar Jain poet, theologian and courtier of the Chalukyan king Jayasimha Siddharaja, writes about constant battles between rival chieftains in Saurashtra who harassed pilgrims and obstructed them from going to Prabhas, where they would be charged pilgrim tax. The Chalukyan kings, beginning with their dynasty's founder Mularaja (941–996 CE), pacified local indigenous dynasties such as the Chavdas and Abhiras and acquired control over the region. The Chalukyans promoted trade and commerce and it was these riches that attracted Mahmud, who wanted to establish himself as an ardent follower of Islam and project himself as a devout Sunni. Perhaps there wasn’t a single reason for Mahmud’s attack on the Somnath temple at Prabhas. It was a combination of factors such as political power, his ambitions for Ghazni, his own standing in the Islamic world, and the lure of wealth at temples. Though Prabhas-Patan is mentioned as a famous tirtha in the Vanaparvan of Mahabharata, there is no clear reference to a temple at Somnath. The myth of Soma and his wives and the curse has been described as a way to link the deity at Somnath with the holy site of Prabhas. In the Mahabharata, there is also a reference to Prabhas as the meeting ground for Krishna and Arjuna. Thus, it could have been an early Vaishnavite pilgrim site before it acquired the Shaivite identity of being one of the 12 Jyotirlingas.`,

                16: `Legal Matter - APHC Motor Accident Claim. This Appeal is filed under Section 173 of the Motor Vehicles Act, 1988, against the award and decree dated 14.08.2024 passed in M.V.O.P. No. 512 of 2021 on the file of the Motor Accident Claims Tribunal-cum-VI Additional District Judge, Guntur. The appellants, who are the legal representatives of the deceased T. Rama Rao, seek enhancement of the compensation awarded by the Tribunal. The brief facts of the case are that on 12.11.2020, at about 08:30 PM, while the deceased was returning to his village on his motorcycle bearing No. AP-07-BK-1102, a lorry bearing No. AP-07-TJ-4452, driven in a rash and negligent manner at high speed, hit the motorcycle from the rear side near the National Highway-16 junction. As a result, the deceased sustained grievous head injuries and died on the spot. The police registered a case in Crime No. 245 of 2020 under Section 304-A of the Indian Penal Code (IPC). At the time of the accident, the deceased was aged 38 years and was earning Rs. 25,000 per month as a Senior Supervisor in a private spinning mill. The learned counsel for the appellants, Sri P. Venkata Rao, argues that the Tribunal erred in fixing the notional income of the deceased at only Rs. 10,000 per month. He submits that the Tribunal failed to add future prospects as per the law laid down by the Supreme Court in National Insurance Company Limited vs. Pranay Sethi (2017). He further contends that the compensation awarded under the heads of loss of consortium and loss of estate is on the lower side. On the other hand, the learned Standing Counsel for the Insurance Company argues that the claimants failed to produce any valid salary certificate or bank statement to prove the income. He further submits that there was contributory negligence as the deceased was not wearing a helmet at the time of the accident. Therefore, the Insurance Company maintains that the award passed by the Tribunal is just and reasonable. After hearing both parties and perusing the record, the Court finds that the Tribunal’s assessment of income was conservative. Even for an unskilled laborer, the minimum wage in 2020 was around Rs. 13,000. Considering the age of 38 years, a multiplier of 15 is applicable as per the Sarla Verma case. Furthermore, 40 percent of the income must be added towards future prospects since the deceased was below 40 years of age. Regarding the helmet issue, the Supreme Court has clarified that non-wearing of a helmet may lead to a small deduction but does not absolve the offending vehicle of negligence. A secondary issue raised by the Insurance Company pertains to the invalid driving license of the lorry driver, as he possessed a license for light motor vehicles but was operating a heavy goods vehicle at the time.`,

                17: `Legal Matter - APHC Criminal Revision 512/2026. This Criminal Revision Case is filed under Section 397 read with Section 401 of the Code of Criminal Procedure (Cr.P.C.), 1973, challenging the order dated 12.12.2025 passed in Crl.M.P. No. 884 of 2025 in Calendar Case No. 1254 of 2022 on the file of the I Additional Junior Civil Judge-cum-I Class Judicial Magistrate, Kadapa. The application was filed by the petitioner accused under Section 65 of the Indian Evidence Act seeking permission to lead secondary evidence in respect of a disputed acknowledgment receipt and a forensic lab opinion. The facts of the case are that the petitioner is facing trial for offences under Sections 420 and 468 of the Indian Penal Code in Crime No. 85 of 2021 of Kadapa I-Town Police Station. The allegation is that he forged the signature of the de-facto complainant on a sale agreement. During the trial, the petitioner filed an application to summon the original report from the Forensic Science Laboratory. However, the prosecution informed the court that the original file was misplaced during the shifting of police records. Consequently, the petitioner sought to mark a certified photocopy of the report as secondary evidence. The Trial Court dismissed the application, holding that the loss of document was not sufficiently proved. The learned counsel for the petitioner argues that the Trial Court committed a grave error, stating that when the State admits the document was in its custody and is now lost, the accused cannot be expected to produce the original. He relies on the Supreme Court judgment in Bipin Shantilal Panchal vs State of Gujarat (2001), which held that courts should allow documents to be marked tentatively to avoid delay. He further argues that the FSL report is crucial as it proves the innocence of the accused since the thumb impressions do not match the specimen samples. On the other hand, the Assistant Public Prosecutor submits that the petitioner is trying to delay the trial and argues that secondary evidence can be admitted only if conditions under Section 65 of the Evidence Act are strictly fulfilled. He contends that no witness was examined to prove the fact of loss of the original file. Therefore, the prosecution maintains that the Trial Court’s order is well-reasoned and legally valid. After hearing both sides, the Court finds that the Trial Court took a very technical view. The primary duty of a criminal court is to ensure a fair trial, which is a fundamental right under Article 21 of the Constitution.`,

                18: `Financial Burden of India's Ageing Population. While India is often celebrated for its demographic dividend, its States are undergoing a significant but uneven demographic transition. According to a recent RBI report, Kerala and Tamil Nadu will become ageing states by 2036 as their elderly populations will exceed 22 percent and 20 percent respectively. On the other hand, the working-age populations of Bihar and Jharkhand will continue to rise beyond 2031, while Karnataka and Maharashtra occupy a middle position balancing growth with ageing pressure. The regional disparity is further highlighted by Total Fertility Rate data. While India's national TFR has fallen to 2.0, below the replacement level of 2.1, states like Uttar Pradesh and Bihar still have higher rates, whereas Sikkim and Goa have dropped to nearly 1.1 and 1.3. By 2041, the share of elderly population aged 60 and above is expected to reach around 16 percent, rising sharply from 8.6 percent in 2011. By 2050, every fifth Indian is likely to be a senior citizen. In states like Kerala, the dependency ratio may reach a level where fewer than three working-age adults support one elderly person, compared to about seven earlier. This creates a fiscal challenge for the government. Between 2021 and 2036, the working-age population is expected to grow by about 9.7 million annually, but nearly half of this increase will be concentrated in a few states. If these states fail to improve labour force participation, especially among women where it remains below 25 percent in some regions, the demographic dividend may turn into a demographic burden. Additionally, healthcare costs for the elderly are estimated to be three to five times higher than for the young. With public health spending around 2.1 percent of GDP in 2024-25, managing an ageing society will require a significant increase in allocation. The RBI has advised ageing states to rationalise subsidies to manage pension costs and younger states to invest heavily in human capital. However, this advice has political implications. Southern states may face reduced central tax share and representation due to population-based policies, while northern states, despite having a younger workforce, face challenges like low education spending and employability issues. With increasing automation and artificial intelligence, the suggestion to boost labour-intensive sectors may not be sufficient, raising the risk that some states may grow old before becoming economically prosperous.`,


                19: `In Kashi Renovation is Part of Eternal Cycle. A densely packed pilgrimage centre began surrounding what was once a secretive and sacred space inhabited by sadhus, relatives of the dead waiting for cremation, and the restless souls of the departed. Kashi is a city that treats the world as a theatre celebrating the eternal cycle of life and death. The storytellers of Kashi are spread across various ghats, the oldest being Manikarnika Ghat. On the steps of these ghats and at nearby tea shops, people share stories that often lead to deeper philosophical reflections. The renovation of Manikarnika Ghat has kept these storytellers engaged in recent times. By 2025, redevelopment under the Kashi Vishwanath Corridor project had transformed a large part of the riverfront. With an expected rise in pilgrim footfall, maintaining the balance between ancient traditions and modern infrastructure has become a topic of debate. The cremation grounds and temples in this area are believed to predate recorded history. However, rebuilding and renaming of ghats has been a continuous process due to natural erosion caused by rivers. Historically, wealthy pilgrims funded such reconstruction, including figures like Raja Man Singh and Ahilyabai Holkar, who contributed significantly to temple restoration. Recent controversies arose when smaller temples and the statue of Ahilyabai Holkar were reportedly removed during redevelopment. This led to protests and public debate. Authorities later clarified that the statues were सुरक्षित and would be reinstalled after redevelopment. The demand for expansion of the cremation grounds was also supported by the Dom Raja family, who have traditionally managed the area. Historically, the region was once surrounded by dense forests, which have now disappeared. Until the time of Alauddin Khilji, Hindus were free to build temples dedicated to various deities,`,

        // ==================== ELEMENTS ====================
        const chapterSelect = document.getElementById("chapterSelect");
        const paragraph = document.getElementById("paragraph");
        const typingArea = document.getElementById("typingArea");
        const studentName = document.getElementById("studentName");
        const timeSelect = document.getElementById("timeSelect");
        const timer = document.getElementById("timer");
        const result = document.getElementById("result");
        const rName = document.getElementById("rName");
        const rWpm = document.getElementById("rWpm");
        const rErrors = document.getElementById("rErrors");
        const rAccuracy = document.getElementById("rAccuracy");
        const finalGrade = document.getElementById("finalGrade");

        let text = "", paraWords = [], timeLeft = 0, interval = null, paused = false;

        // ==================== CHAPTER DROPDOWN ====================
        for (let key in chapters) {
            let opt = document.createElement("option");
            opt.value = key;
            opt.innerText = `Chapter ${key}`;
            chapterSelect.appendChild(opt);
        }

        // ==================== LOAD CHAPTER (RESET LOGIC ADDED) ====================
        function loadChapter() {
            if (interval !== null) {
                clearInterval(interval);
                interval = null;
            }

            paused = false;
            timeLeft = parseInt(timeSelect.value);
            updateTimer();

            result.style.display = "none";
            rName.innerText = "";
            rWpm.innerText = "0";
            rErrors.innerText = "0";
            rAccuracy.innerText = "0";
            finalGrade.innerText = "";

            text = chapters[chapterSelect.value];
            paraWords = text.split(" ");
            paragraph.innerHTML = paraWords.map(w => `<span>${w} </span>`).join("");

            typingArea.value = "";
            typingArea.disabled = true;
        }

        chapterSelect.addEventListener("change", loadChapter);
        loadChapter();

        // ==================== START TEST ====================
        function startTest() {
            if (studentName.value.trim() === "") {
                alert("Please write name");
                return;
            }

            if (interval !== null && !paused) return;

            if (interval === null) {
                timeLeft = parseInt(timeSelect.value);
                updateTimer();
            }

            paused = false;
            typingArea.disabled = false;
            typingArea.focus();

            if (interval === null) {
                interval = setInterval(() => {
                    if (!paused) {
                        timeLeft--;
                        updateTimer();
                        if (timeLeft <= 0) endTest();
                    }
                }, 1000);
            }
        }

        function pauseTest() {
            if (interval === null) return;
            paused = !paused;
        }

        function submitTest() {
            if (!interval) { alert("Test start नहीं हुआ"); return; }
            endTest();
        }

        function updateTimer() {
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            timer.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        // ==================== TYPING LOGIC ====================
        typingArea.addEventListener("input", () => {
            const typed = typingArea.value.trim().split(/\s+/);
            const spans = document.querySelectorAll("#paragraph span");

            spans.forEach((span, i) => {
                if (!typed[i]) span.className = "";
                else if (typed[i] === paraWords[i]) span.className = "correct";
                else span.className = "incorrect";
            });

            if (typed.length === paraWords.length && typed[typed.length - 1] === paraWords[paraWords.length - 1]) {
                endTest();
            }
        });

        // ==================== END TEST ====================
        function endTest() {
            clearInterval(interval);
            interval = null;
            typingArea.disabled = true;

            const typed = typingArea.value.trim().split(" ");
            let errors = 0;
            typed.forEach((w, i) => { if (w !== paraWords[i]) errors++; });

            let totalTime = parseInt(timeSelect.value) - timeLeft;
            let minutes = totalTime / 60 || 1;
            let wpm = Math.round(typed.length / minutes);
            let acc = typed.length ? Math.round(((typed.length - errors) / typed.length) * 100) : 0;

            rName.innerText = studentName.value;
            rWpm.innerText = wpm;
            rErrors.innerText = errors;
            rAccuracy.innerText = acc;
            finalGrade.innerText = getGrade(acc);
            result.style.display = "block";
        }

        // ==================== GRADE ====================
        function getGrade(acc) {
            if (acc >= 95) return "A+";
            if (acc >= 90) return "A";
            if (acc >= 80) return "B";
            if (acc >= 70) return "C";
            return "Needs Practice";
        }

        // ==================== BACKSPACE CONTROL ====================
        let backspaceDisabled = true;
        const backspaceBtn = document.getElementById("backspaceBtn");

        function toggleBackspace() {
            backspaceDisabled = !backspaceDisabled;
            backspaceBtn.innerText = backspaceDisabled ? "Backspace: OFF" : "Backspace: ON";
        }

        typingArea.addEventListener("keydown", function (e) {
            if (backspaceDisabled && e.key === "Backspace") {
                e.preventDefault();
            }
        });
    </script>


</body>

</html>
